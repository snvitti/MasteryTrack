<title>MasteryTrack</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── CSS Variables (Slate Blue Theme) ── */
:root{
  --bg:#f0f4ff;
  --surface:#ffffff;
  --nav-bg:#1e2d5a;
  --accent:#3b5bdb;
  --accent-hover:#2f4ac0;
  --text:#1a1d2e;
  --muted:#5a6a9a;
  --border:rgba(30,45,90,.1);
  --border-med:rgba(30,45,90,.18);
  --shadow:0 1px 5px rgba(30,45,90,.08);
  --shadow-md:0 2px 12px rgba(30,45,90,.1);
  --radius:16px;
  --radius-sm:10px;
  --fs:15px;
}

/* ── Reset & Base ── */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter','Segoe UI',system-ui,sans-serif;font-size:var(--fs);line-height:1.65;background:var(--bg);color:var(--text);min-height:100vh}
button{cursor:pointer;font-family:inherit;font-size:inherit;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:inherit;color:inherit}
a{color:var(--accent);text-decoration:none}

/* ── Buttons ── */
.btn{padding:8px 16px;border-radius:var(--radius-sm);font-weight:600;transition:all .14s;border:1px solid transparent;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;font-family:inherit}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}.btn-primary:hover{background:var(--accent-hover);transform:translateY(-1px)}
.btn-primary:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn-secondary{background:#fff;color:#1e2d5a;border:0.5px solid #c5d0f0}.btn-secondary:hover{background:#f0f4ff}
.btn-ghost{color:var(--muted);padding:6px 12px;border-radius:8px}.btn-ghost:hover{background:rgba(30,45,90,.06)}
.btn-danger{background:#dc2626;color:#fff;border-color:#dc2626}.btn-danger:hover{background:#b91c1c}
.btn-sm{padding:5px 12px;font-size:.88em}
.btn-xs{padding:3px 9px;font-size:.82em}

/* ── Form elements ── */
.input{width:100%;padding:8px 12px;border:0.5px solid #c5d0f0;border-radius:var(--radius-sm);outline:none;transition:border .15s;background:#f8faff}
.input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,91,219,.12);background:#fff}
.select{width:100%;padding:8px 12px;border:0.5px solid #c5d0f0;border-radius:var(--radius-sm);outline:none;background:#f8faff;cursor:pointer}
.select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,91,219,.1)}
label{font-size:.88em;font-weight:500;color:#3a4570;display:block;margin-bottom:4px}

/* ── Layout ── */
.nav{background:var(--nav-bg);padding:0 24px;display:flex;align-items:center;height:56px;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(10,20,60,.18)}
.nav-logo{font-weight:800;font-size:1.15em;color:#fff;letter-spacing:-.5px;flex-shrink:0}
.nav-logo span{color:#7dd3fc}
.page{max-width:960px;margin:0 auto;padding:32px 24px}
.tabs{display:flex;border-bottom:1px solid var(--border-med);margin-bottom:28px}
.tab{padding:10px 18px;font-size:.92em;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;background:none;border-left:none;border-right:none;border-top:none;font-family:inherit}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover:not(.active){color:var(--text)}

/* ── Cards ── */
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
.card-hover{transition:all .15s;cursor:pointer}
.card-hover:hover{border-color:#93b4f8;box-shadow:var(--shadow-md)}

/* ── Typography helpers ── */
.section-title{font-size:1.28em;font-weight:700;color:var(--text);margin-bottom:4px;letter-spacing:-.3px}
.section-sub{font-size:.92em;color:var(--muted);margin-bottom:24px}
.text-sm{font-size:.88em}.text-xs{font-size:.8em}.text-muted{color:var(--muted)}
.fw6{font-weight:600}.fw7{font-weight:700}

/* ── Spacing ── */
.mt4{margin-top:4px}.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mt24{margin-top:24px}
.mb4{margin-bottom:4px}.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}.mb20{margin-bottom:20px}.mb24{margin-bottom:24px}
.gap4{gap:4px}.gap6{gap:6px}.gap8{gap:8px}.gap12{gap:12px}.gap16{gap:16px}

/* ── Flex helpers ── */
.flex{display:flex;align-items:center}
.flex-between{display:flex;align-items:center;justify-content:space-between}
.flex-wrap{display:flex;flex-wrap:wrap}

/* ── Grid ── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* ── Tags & Badges ── */
.tag{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:.82em;font-weight:600}
.tag-green{background:#f0fdf4;color:#166534;border:0.5px solid #bbf7d0}
.tag-yellow{background:#fefce8;color:#854d0e;border:0.5px solid #fde68a}
.tag-red{background:#fff1f2;color:#9f1239;border:0.5px solid #fecdd3}
.tag-gray{background:#f1f5f9;color:#475569;border:0.5px solid #e2e8f0}
.tag-blue{background:#dbeafe;color:#1e40af;border:0.5px solid #bfdbfe}
.tag-purple{background:#ede9fe;color:#6d28d9;border:0.5px solid #ddd6fe}
.std-badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:6px;font-size:.77em;font-weight:700;background:#dbeafe;color:#1e40af}

/* ── Mastery cells ── */
.mastery-cell{border-radius:20px;padding:4px 12px;font-size:.88em;font-weight:600;display:inline-flex;align-items:center;gap:5px}
.m-green{background:#f0fdf4;color:#166534;border:0.5px solid #bbf7d0}
.m-yellow{background:#fefce8;color:#854d0e;border:0.5px solid #fde68a}
.m-red{background:#fff1f2;color:#9f1239;border:0.5px solid #fecdd3}
.m-gray{background:#f1f5f9;color:#64748b;border:0.5px solid #e2e8f0}
.m-mini{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.8em;font-weight:700}

/* ── Nav controls ── */
.nav-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.9);border-radius:8px;padding:5px 12px;font-size:.82em;font-weight:500;cursor:pointer;font-family:inherit;transition:background .12s}
.nav-btn:hover{background:rgba(255,255,255,.22)}
.nav-badge{background:rgba(255,255,255,.15);color:#c7d9ff;border-radius:20px;padding:4px 12px;font-size:.77em;font-weight:600}

/* ── Font size buttons ── */
.fs-btn{width:30px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:700;cursor:pointer;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.1);color:rgba(255,255,255,.85);font-family:inherit;transition:all .12s}
.fs-btn:hover{background:rgba(255,255,255,.22)}
.fs-btn.fs-active{background:rgba(255,255,255,.3);border-color:rgba(255,255,255,.5);color:#fff}

/* ── Info boxes ── */
.info-box{border-radius:var(--radius-sm);padding:10px 14px;font-size:.88em;margin-bottom:12px}
.info-warn{background:#fefce8;border:0.5px solid #fde68a;color:#854d0e}
.info-info{background:#eff6ff;border:0.5px solid #bfdbfe;color:#1e40af}
.info-success{background:#f0fdf4;border:0.5px solid #bbf7d0;color:#166534}
.info-error{background:#fff1f2;border:0.5px solid #fecdd3;color:#9f1239}

/* ── Drop zones ── */
.drop-zone{border:2px dashed #93b4f8;border-radius:var(--radius);padding:28px;text-align:center;background:#f0f4ff;cursor:pointer;transition:all .15s;margin-bottom:16px}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--accent);background:#e0e8ff}
.drop-zone-sm{border:1.5px dashed #93b4f8;border-radius:var(--radius-sm);padding:12px 16px;text-align:center;background:#f0f4ff;cursor:pointer;transition:all .15s}
.drop-zone-sm:hover{border-color:var(--accent);background:#e0e8ff}

/* ── Coverage table ── */
.cov-table{width:100%;border-collapse:collapse;font-size:.88em}
.cov-table th{text-align:center;padding:8px 12px;font-weight:600;color:var(--muted);border-bottom:1px solid var(--border-med);font-size:.8em;text-transform:uppercase;letter-spacing:.4px}
.cov-table td{text-align:center;padding:8px 12px;border-bottom:0.5px solid var(--border)}
.cov-ok{background:#f0fdf4;color:#166534;border-radius:20px;padding:2px 10px;font-weight:700;display:inline-block;border:0.5px solid #bbf7d0}
.cov-warn{background:#fefce8;color:#854d0e;border-radius:20px;padding:2px 10px;font-weight:700;display:inline-block;border:0.5px solid #fde68a}

/* ── Question strip ── */
.q-strip{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:20px}
.q-num{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.88em;font-weight:600;cursor:pointer;border:0.5px solid #c5d0f0;background:#fff;color:var(--text);transition:all .1s}
.q-num.answered{background:var(--accent);color:#fff;border-color:var(--accent)}
.q-num.current{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,91,219,.2)}

/* ── Timer ── */
.timer-box{padding:6px 14px;border-radius:8px;font-weight:700;font-size:1em;font-variant-numeric:tabular-nums}
.timer-normal{background:#f1f5f9;color:#1e2d5a;border:0.5px solid #c5d0f0}
.timer-yellow{background:#fefce8;color:#854d0e;border:0.5px solid #fde68a}
.timer-red{background:#fff1f2;color:#9f1239;border:0.5px solid #fecdd3;animation:blink .9s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.6}}

/* ── Option buttons ── */
.opt-btn{width:100%;text-align:left;padding:11px 16px;border-radius:var(--radius-sm);border:0.5px solid #c5d0f0;background:#fff;font-size:1em;color:var(--text);transition:all .12s;cursor:pointer;display:flex;align-items:center;gap:12px;margin-bottom:8px}
.opt-btn:hover{border-color:#93b4f8;background:#f0f4ff}
.opt-btn.selected{border-color:var(--accent);background:#eef2ff}

/* ── Results ── */
.results-row{border:0.5px solid var(--border-med);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:10px;box-shadow:var(--shadow)}
.results-hdr{padding:13px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;background:#fff}
.results-hdr:hover{background:#f8faff}
.results-body{padding:16px 18px;border-top:0.5px solid var(--border);background:#f8faff}

/* ── Video card ── */
.video-card{border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;display:flex;align-items:flex-start;gap:12px;background:#fff;margin-bottom:8px;box-shadow:var(--shadow)}
.video-thumb{width:44px;height:34px;border-radius:8px;background:#dbeafe;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}

/* ── Unit/assessment ── */
.unit-card{border:0.5px solid var(--border-med);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;background:#fff;box-shadow:var(--shadow)}
.unit-hdr{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;background:#f8faff;border-bottom:0.5px solid var(--border)}
.unit-hdr:hover{background:#f0f4ff}
.unit-body{padding:16px 18px}
.asm-card{border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:13px 16px;margin-bottom:8px;background:#fff;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;box-shadow:var(--shadow)}
.asm-card:hover{border-color:#93b4f8;box-shadow:var(--shadow-md)}

/* ── Student row ── */
.student-row{border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:13px 18px;margin-bottom:8px;background:#fff;cursor:pointer;transition:all .15s;box-shadow:var(--shadow)}
.student-row:hover{border-color:#93b4f8;box-shadow:0 2px 10px rgba(59,91,219,.1);transform:translateY(-1px)}

/* ── Choice row in builder ── */
.choice-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.choice-dot{width:18px;height:18px;border-radius:50%;border:2px solid #c5d0f0;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s}
.choice-dot.mc-on{background:var(--accent);border-color:var(--accent)}
.choice-dot.multi-on{background:#7c3aed;border-color:#7c3aed}
.choice-dot-inner{width:7px;height:7px;border-radius:50%;background:#fff}

/* ── Preview item ── */
.preview-item{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;border-radius:8px;border:0.5px solid var(--border-med);margin-bottom:6px;background:#fff;cursor:pointer;transition:all .1s}
.preview-item.checked{border-color:var(--accent);background:#eef2ff}
.preview-item:hover{border-color:#93b4f8}

/* ── Spinner ── */
.spinner{width:20px;height:20px;border:2.5px solid #c5d0f0;border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Toggle switch ── */
.toggle{width:40px;height:22px;border-radius:11px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.toggle-knob{position:absolute;top:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .2s}

/* ── Image preview ── */
.img-preview{max-width:100%;max-height:180px;border-radius:10px;border:0.5px solid var(--border);object-fit:contain;display:block;margin-top:8px}

/* ── Course card ── */
.course-card{background:#fff;border:0.5px solid var(--border);border-radius:18px;padding:22px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow)}
.course-card:hover{border-color:#93b4f8;box-shadow:0 4px 20px rgba(59,91,219,.13);transform:translateY(-2px)}

/* ── Divider ── */
hr.div{border:none;border-top:0.5px solid var(--border);margin:16px 0}

/* ── Print styles ── */
@media print {
  body{background:#fff!important;font-size:12px;color:#000}
  .nav,.no-print,.btn,.tabs{display:none!important}
  .print-only{display:block!important}
  .card{box-shadow:none!important;border:1px solid #ddd!important;break-inside:avoid}
  .page{padding:0!important;max-width:100%!important}
  h1,h2,h3{color:#000!important}
  .tag,.std-badge{border:1px solid #ccc!important}
  @page{margin:1.5cm;size:A4}
}
.print-only{display:none}
.print-btn{background:var(--accent);color:#fff;border:none;padding:8px 16px;border-radius:var(--radius-sm);font-size:.88em;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-family:inherit}
.print-btn:hover{background:var(--accent-hover)}
</style>
</head>

<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

// ═══════════════════════════════════════════════════════════

const SEED_STANDARDS=[
  {id:'s1',code:'1.1',title:'Cell Membrane Structure',desc:'Describe the phospholipid bilayer and roles of membrane proteins in transport and signaling.'},
  {id:'s2',code:'1.2',title:'Membrane Transport',desc:'Distinguish between passive and active transport mechanisms across cell membranes.'},
  {id:'s3',code:'1.3',title:'Neural Signaling',desc:'Explain how action potentials are generated and propagated along neurons.'},
  {id:'s4',code:'1.4',title:'Synaptic Transmission',desc:'Describe the sequence of events at a chemical synapse from vesicle release to receptor binding.'},
  {id:'s5',code:'1.5',title:'Homeostasis & Feedback',desc:'Distinguish between negative and positive feedback loops with physiological examples.'},

const SEED_QUESTIONS=[
  {id:'q1',text:'Which component of the plasma membrane is primarily responsible for its selective permeability?',format:'mc',choices:['Cholesterol','Phospholipid bilayer','Integral proteins','Carbohydrate chains'],correct:1,correctMulti:[],standards:['s1'],difficulty:'Basic',explanation:'The phospholipid bilayer creates a hydrophobic core that prevents most polar and charged molecules from freely crossing.',wrongExplanations:{0:'Cholesterol modulates fluidity but is not the primary barrier.',2:'Proteins create channels/carriers but the bilayer itself is the permeability barrier.',3:'Carbohydrate chains function in cell recognition, not selective permeability.'},image:null,tolerance:0.5},
  {id:'q2',text:'A researcher blocks Na⁺/K⁺-ATPase with ouabain. Which result is most expected?',format:'mc',choices:['Increased oxygen consumption','Intracellular Na⁺ rises, K⁺ falls','Faster membrane repolarization','More negative resting potential'],correct:1,correctMulti:[],standards:['s2'],difficulty:'Conceptual',explanation:'Na⁺/K⁺-ATPase pumps 3 Na⁺ out and 2 K⁺ in. Blocking it causes Na⁺ to accumulate inside and K⁺ to decrease.',wrongExplanations:{0:'ATP use would drop, not increase, without the pump cycling.',2:'Repolarization would be impaired, not faster.',3:'Potential would become less negative as Na⁺ accumulates.'},image:null,tolerance:0.5},
  {id:'q3',text:'During the depolarization phase of an action potential, which ion rushes INTO the cell?',format:'mc',choices:['K⁺','Cl⁻','Ca²⁺','Na⁺'],correct:3,correctMulti:[],standards:['s3'],difficulty:'Basic',explanation:'Voltage-gated Na⁺ channels open during depolarization, allowing Na⁺ to rush in down its electrochemical gradient.',wrongExplanations:{0:'K⁺ exits during repolarization.',1:'Cl⁻ movement is not the primary driver of depolarization.',2:'Ca²⁺ entry is important at the synapse, not for axon depolarization.'},image:null,tolerance:0.5},
  {id:'q4',text:'Select ALL structures correctly matched with their function in synaptic transmission.',format:'multi',choices:['Synaptic vesicle — stores neurotransmitters','Voltage-gated Ca²⁺ channel — triggers vesicle fusion','Postsynaptic density — packages neurotransmitters','Reuptake transporter — clears neurotransmitter from synapse'],correct:0,correctMulti:[0,1,3],standards:['s4'],difficulty:'Conceptual',explanation:'Vesicles store NTs; Ca²⁺ influx triggers exocytosis; reuptake transporters clear the cleft. The postsynaptic density anchors receptors, it does not package neurotransmitters.',wrongExplanations:{2:'The postsynaptic density anchors receptors; neurotransmitters are packaged in the presynaptic terminal.'},image:null,tolerance:0.5},
  {id:'q5',text:'A drop in blood glucose triggers glucagon release, which raises glucose. This is an example of:',format:'mc',choices:['Positive feedback','Feedforward regulation','Negative feedback','Hormonal cascade'],correct:2,correctMulti:[],standards:['s5'],difficulty:'Basic',explanation:'Negative feedback: deviation from set point (low glucose) triggers a response (glucagon) that counteracts it.',wrongExplanations:{0:'Positive feedback amplifies, not corrects, a deviation.',1:'Feedforward anticipates a change before it occurs.',3:'Hormonal cascade is not a feedback classification.'},image:null,tolerance:0.5},
  {id:'q6',text:'Oxytocin during labor: contractions → more oxytocin → stronger contractions. This is:',format:'mc',choices:['Negative feedback','Negative feedforward','Positive feedback','Autonomic override'],correct:2,correctMulti:[],standards:['s5'],difficulty:'Conceptual',explanation:'Positive feedback amplifies the response away from the set point; terminated only by delivery.',wrongExplanations:{0:'Negative feedback would reduce contractions, not amplify them.',1:'Feedforward precedes the stimulus.',3:'This is an endocrine mechanism, not autonomic classification.'},image:null,tolerance:0.5},
  {id:'q7',text:'A neuron has a resting potential of −70 mV. What approximate voltage is reached at the peak of an action potential?',format:'numeric',choices:[],correct:30,correctMulti:[],standards:['s3'],difficulty:'Applied',explanation:'Massive Na⁺ influx drives the membrane to approximately +30 mV before voltage-gated Na⁺ channels inactivate.',wrongExplanations:{},image:null,tolerance:5},
  {id:'q8',text:'Which transport mechanism requires BOTH a carrier protein AND ATP directly?',format:'mc',choices:['Simple diffusion','Facilitated diffusion','Primary active transport','Secondary active transport'],correct:2,correctMulti:[],standards:['s2'],difficulty:'Applied',explanation:'Primary active transport (e.g., Na⁺/K⁺-ATPase) uses ATP directly. Secondary active transport couples to an ion gradient, not ATP directly.',wrongExplanations:{0:'Simple diffusion requires no protein or energy.',1:'Facilitated diffusion uses a carrier but no ATP.',3:'Secondary active transport uses the gradient established by primary active transport, not ATP directly.'},image:null,tolerance:0.5},
  {id:'q9',text:'The fluid mosaic model describes the plasma membrane as:',format:'mc',choices:['A rigid bilayer of tightly packed phospholipids','A dynamic bilayer with freely moving proteins and lipids','A static protein scaffold embedded in lipids','A single-layered lipid sheet with surface proteins'],correct:1,correctMulti:[],standards:['s1'],difficulty:'Basic',explanation:'The fluid mosaic model emphasizes lateral movement of both lipids and proteins within the bilayer.',wrongExplanations:{0:'The membrane is fluid, not rigid.',2:'Proteins move laterally; the membrane is not static.',3:'The membrane is a bilayer (two leaflets), not a monolayer.'},image:null,tolerance:0.5},
];

const SEED_VIDEOS=[

// SCORING
// ═══════════════════════════════════════════════════════════
const WEIGHTS={Basic:1,Conceptual:2,Applied:3};
const THRESH={green:0.85,yellow:0.60};

function isCorrect(q,ans){
  if(q.format==='mc') return Number(ans)===q.correct;
  if(q.format==='multi'){
    if(!Array.isArray(ans)) return false;
    const a=[...ans].map(Number).sort((a,b)=>a-b);
    const b=[...(q.correctMulti||[])].map(Number).sort((a,b)=>a-b);
    return JSON.stringify(a)===JSON.stringify(b);
  }
  return Math.abs(Number(ans)-q.correct)<=(q.tolerance||0.5);
}

// Partial credit score for multi-select (0 to 1)
function partialCredit(q,ans){
  if(q.format!=='multi') return isCorrect(q,ans)?1:0;
  if(!Array.isArray(ans)) return 0;
  const correct=new Set((q.correctMulti||[]).map(Number));
  const selected=new Set(ans.map(Number));
  const totalChoices=q.choices.length;
  // Score = (correct selections + correct rejections) / total choices
  let score=0;
  for(let i=0;i<totalChoices;i++){
    const shouldSelect=correct.has(i);
    const didSelect=selected.has(i);
    if(shouldSelect===didSelect) score++;
  }
  return score/totalChoices;
}

function scoreAttempt(attempt,questions){
  const stdMap={};
  questions.forEach(q=>{
    if(!attempt.answers.hasOwnProperty(q.id)) return;
    const w=WEIGHTS[q.difficulty]||1;
    const credit=partialCredit(q,attempt.answers[q.id]);
    q.standards.forEach(sid=>{
      if(!stdMap[sid]) stdMap[sid]={earned:0,possible:0};
      stdMap[sid].possible+=w;
      stdMap[sid].earned+=w*credit;
    });
  });
  const stdScores={};
  Object.entries(stdMap).forEach(([sid,{earned,possible}])=>{stdScores[sid]=possible>0?earned/possible:null;});
  const answered=questions.filter(q=>attempt.answers.hasOwnProperty(q.id));
  const overall=answered.reduce((acc,q)=>{
    const credit=partialCredit(q,attempt.answers[q.id]);
    return{earned:acc.earned+credit,total:acc.total+1};
  },{earned:0,total:0});
  return{stdScores,overall};
}

function masteryLevel(score){
  if(score===null||score===undefined) return 'untested';
  if(score>=THRESH.green) return 'green';
  if(score>=THRESH.yellow) return 'yellow';
  return 'red';
}

function bestMastery(attempts,studentId,questions){
  // Weighted average across ALL attempts per standard.
  // Weight = number of weighted points possible for that standard in each attempt.
  // This gives a defensible mastery score: more questions = more weight.
  const stdEarned={};  // total weighted points earned per standard
  const stdPossible={}; // total weighted points possible per standard
  attempts.filter(a=>a.studentId===studentId).forEach(attempt=>{
    const qs=questions.filter(q=>attempt.answers.hasOwnProperty(q.id));
    qs.forEach(q=>{
      const w=WEIGHTS[q.difficulty]||1;
      const credit=partialCredit(q,attempt.answers[q.id]);
      q.standards.forEach(sid=>{
        if(!stdEarned[sid]) stdEarned[sid]=0;
        if(!stdPossible[sid]) stdPossible[sid]=0;
        stdEarned[sid]+=w*credit;
        stdPossible[sid]+=w;
      });
    });
  });
  const result={};
  Object.keys(stdPossible).forEach(sid=>{
    result[sid]=stdPossible[sid]>0?stdEarned[sid]/stdPossible[sid]:null;
  });
  return result;
}

function bestOverallPct(attempts,studentId,assessmentId,questions){
  const myAttempts=attempts.filter(a=>a.studentId===studentId&&a.assessmentId===assessmentId);
  if(!myAttempts.length) return null;
  let best=0;
  myAttempts.forEach(att=>{
    const qs=questions.filter(q=>att.answers.hasOwnProperty(q.id));
    const {overall}=scoreAttempt(att,qs);
    if(overall.total>0){const pct=overall.earned/overall.total*100;if(pct>best)best=pct;}
  });
  return best;
}

// QUESTION POOL SAMPLER
// ═══════════════════════════════════════════════════════════
// Seeded shuffle so same student+attempt gets reproducible order if needed
function seededShuffle(arr, seed){
  const a=[...arr];
  let s=seed;
  for(let i=a.length-1;i>0;i--){
    s=(s*1664525+1013904223)&0xffffffff;
    const j=Math.abs(s)%(i+1);
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

// Draw questions from pool based on poolSettings
// poolSettings: {[standardId]: {Basic:n, Conceptual:n, Applied:n}}
// Returns an array of questions for this student session
function drawFromPool(allQuestions, poolSettings, randomize){
  if(!poolSettings||Object.keys(poolSettings).length===0) return [];
  const drawn=[];
  const seed=Date.now();
  Object.entries(poolSettings).forEach(([stdId, diffCounts])=>{
    ['Basic','Conceptual','Applied'].forEach(diff=>{
      const count=Number(diffCounts[diff])||0;
      if(count===0) return;
      // Get all questions tagged to this standard AND difficulty
      const pool=allQuestions.filter(q=>
        q.standards.includes(stdId) && q.difficulty===diff
      );
      // Shuffle pool and take 'count' questions
      const shuffled=seededShuffle(pool, seed+stdId.length+diff.length);
      drawn.push(...shuffled.slice(0,count));
    });
  });
  // Remove duplicates (a question tagged to multiple standards might appear twice)
  const seen=new Set();
  const unique=drawn.filter(q=>{if(seen.has(q.id))return false;seen.add(q.id);return true;});
  // Apply overall question order randomization if enabled
  return randomize?seededShuffle(unique,seed):unique;
}

function QuestionForm({initQ,standards,onSave,onCancel}){

  const [f,setF]=useState(initQ?{...empty,...initQ,numCorrect:String(initQ.correct||''),numTolerance:String(initQ.tolerance||'0.5'),wrongExplanations:initQ.wrongExplanations||{}}:empty);

  function addChoice(){setF(p=>({...p,choices:[...p.choices,'']}));}
  function removeChoice(i){setF(p=>{const ch=[...p.choices];ch.splice(i,1);let c=p.correct;let cm=[...p.correctMulti];if(p.format==='mc'&&c>=i)c=Math.max(0,c-1);if(p.format==='multi')cm=cm.filter(x=>x!==i).map(x=>x>i?x-1:x);return{...p,choices:ch,correct:c,correctMulti:cm};});}
  function toggleMulti(i){setF(p=>{const cm=[...p.correctMulti];const idx=cm.indexOf(i);if(idx>=0)cm.splice(idx,1);else cm.push(i);return{...p,correctMulti:cm};});}
  function toggleStd(sid){setF(p=>({...p,standards:p.standards.includes(sid)?p.standards.filter(x=>x!==sid):[...p.standards,sid]}));}

  function handleSave(){
    const q={...f,id:initQ?.id||'q'+Date.now()};
    if(q.format==='numeric'){q.correct=Number(q.numCorrect);q.tolerance=Number(q.numTolerance||0.5);}

              <div className="text-xs fw6 text-muted mb4">Choice {i+1}: "{f.choices[i]||'(empty)'}"</div>
              <input className="input" value={(f.wrongExplanations||{})[i]||''} onChange={e=>setF(p=>({...p,wrongExplanations:{...(p.wrongExplanations||{}),[i]:e.target.value}}))} placeholder={`Why choice ${i+1} is wrong…`}/>
            </div>
          ))}
        </div>
      )}
      <div className="flex gap8 mt16"><button className="btn btn-primary" onClick={handleSave}>Save question</button><button className="btn btn-secondary" onClick={onCancel}>Cancel</button></div>
    </div>
  );
}

// QUESTION BANK UPLOADER (AI removed — placeholder only)
// ═══════════════════════════════════════════════════════════

// QUESTION PASTE IMPORTER
// ═══════════════════════════════════════════════════════════
function parseQuestionText(raw){
  // Split on double newlines to get question blocks
  const normalised=raw.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  const blocks=normalised.split('\n\n').map(b=>b.trim()).filter(Boolean);
  const questions=[];
  blocks.forEach(function(block){
    const blines=block.split('\n').map(function(l){return l.trim();}).filter(Boolean);
    if(!blines.length) return;
    var qMatch=blines[0].match(/^[0-9]+[.)][\s]+(.+)/);
    if(!qMatch) qMatch=blines[0].match(/^[0-9]+[.)](\S.+)/);
    if(!qMatch) return;
    var text=qMatch[1].trim();
    // Numeric: line containing NUM
    var numLine=null;
    for(var ni=0;ni<blines.length;ni++){if(/^NUM[\s]/i.test(blines[ni])){numLine=blines[ni];break;}}
    if(numLine){
      var nparts=numLine.split(/[\s]+/);
      questions.push({id:'pq'+Date.now()+Math.random().toString(36).slice(2),text:text,format:'numeric',choices:[],correct:Number(nparts[1])||0,correctMulti:[],tolerance:Number(nparts[2])||0.5,standards:[],difficulty:'Basic',explanation:'',wrongExplanations:{},image:null});
      return;
    }
    // Choices: lines starting with optional * then a letter then . or )
    var choiceLines=blines.slice(1).filter(function(l){return /^[*]?[a-zA-Z][.)][\s]/.test(l)||/^[*]?[a-zA-Z][.)]\S/.test(l);});
    if(!choiceLines.length) return;
    var choices=[];
    var correctIdxs=[];
    choiceLines.forEach(function(cl,ci){
      var isCor=cl.charAt(0)==='*';
      var choiceText=cl.replace(/^[*]?[a-zA-Z][.)][\s]*/,'').trim();
      choices.push(choiceText);
      if(isCor) correctIdxs.push(ci);
    });
    var isMulti=correctIdxs.length>1;
    questions.push({id:'pq'+Date.now()+Math.random().toString(36).slice(2),text:text,format:isMulti?'multi':'mc',choices:choices,correct:correctIdxs[0]!==undefined?correctIdxs[0]:0,correctMulti:correctIdxs,tolerance:0.5,standards:[],difficulty:'Basic',explanation:'',wrongExplanations:{},image:null});
  });
  return questions;
}

function QuestionBankUploader({standards,onAdd}){
  const [mode,setMode]=useState('idle'); // idle | paste | review
  const [rawText,setRawText]=useState('');
  const [parsed,setParsed]=useState([]);
  const [editIdx,setEditIdx]=useState(null);
  const [editForm,setEditForm]=useState(null);

  function handleParse(){
    const qs=parseQuestionText(rawText);
    if(!qs.length){alert('No questions detected. Check your formatting.');return;}
    setParsed(qs.map(q=>({...q,_checked:true})));
    setMode('review');
  }

  function updateParsed(idx,patch){
    setParsed(prev=>prev.map((q,i)=>i===idx?{...q,...patch}:q));
  }

  function handleImport(){
    onAdd(parsed.filter(q=>q._checked).map(({_checked,...q})=>q));
    setParsed([]);setRawText('');setMode('idle');
  }

  function toggleStd(idx,sid){
    const q=parsed[idx];
    const stds=q.standards.includes(sid)?q.standards.filter(x=>x!==sid):[...q.standards,sid];
    updateParsed(idx,{standards:stds});
  }

  if(mode==='idle') return(
    <div style={{border:'1.5px dashed #93b4f8',borderRadius:10,padding:'12px 16px',background:'#f0f4ff',marginBottom:12,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
      <div>
        <div className="fw6 text-sm" style={{color:'#1e2d5a'}}>📋 Paste questions from Word or text</div>
        <div className="text-xs text-muted">Supports numbered MC, multi-select and numeric questions</div>
      </div>
      <button className="btn btn-secondary btn-sm" onClick={()=>setMode('paste')}>Paste questions</button>
    </div>
  );

  if(mode==='paste') return(
    <div className="card mb12" style={{border:'1.5px solid #93b4f8'}}>
      <div className="fw7 mb4" style={{fontSize:15}}>Paste your questions</div>
      <div className="text-xs text-muted mb12" style={{lineHeight:1.7}}>
        Format: number the questions, letter the choices, put <code style={{background:'#e0e7ff',padding:'1px 5px',borderRadius:4}}>*</code> before the correct answer. Blank line between questions.<br/>
        <strong>MC:</strong> <code style={{background:'#f1f5f9',padding:'1px 5px',borderRadius:4}}>1. Question text</code> then <code style={{background:'#f1f5f9',padding:'1px 5px',borderRadius:4}}>*a. Correct</code> <code style={{background:'#f1f5f9',padding:'1px 5px',borderRadius:4}}>b. Wrong</code><br/>
        <strong>Multi-select:</strong> mark multiple answers with <code style={{background:'#e0e7ff',padding:'1px 5px',borderRadius:4}}>*</code><br/>
        <strong>Numeric:</strong> add a line <code style={{background:'#f1f5f9',padding:'1px 5px',borderRadius:4}}>NUM 30 5</code> (correct=30, tolerance=±5)
      </div>
      <textarea className="input mb12" rows={10} value={rawText} onChange={e=>setRawText(e.target.value)}
        placeholder={'1. Question text?\n*a. Correct answer\nb. Wrong answer\nc. Wrong answer\n\n2. Numeric question?\nNUM 30 5'}
        style={{fontFamily:"monospace",fontSize:13,lineHeight:1.6}}
      />
      <div className="flex gap8">
        <button className="btn btn-primary btn-sm" onClick={handleParse}>Parse questions</button>
        <button className="btn btn-ghost btn-sm" onClick={()=>{setMode('idle');setRawText('');}}>Cancel</button>
      </div>
    </div>
  );

  // Review mode — edit each question before importing
  return(
    <div className="card mb12" style={{border:'1.5px solid #93b4f8'}}>
      <div className="flex-between mb12">
        <div>
          <div className="fw7" style={{fontSize:15}}>{parsed.length} question{parsed.length!==1?'s':''} detected</div>
          <div className="text-sm text-muted">Set standards and difficulty for each, then import.</div>
        </div>
        <div className="flex gap8">
          <button className="btn btn-primary btn-sm" onClick={handleImport}>
            Import {parsed.filter(q=>q._checked).length} selected
          </button>
          <button className="btn btn-ghost btn-sm" onClick={()=>setMode('paste')}>← Back</button>
        </div>
      </div>

      {parsed.map((q,idx)=>(
        <div key={q.id} style={{border:`1px solid ${q._checked?'#93b4f8':'#e5e7eb'}`,borderRadius:10,marginBottom:10,overflow:'hidden'}}>
          {/* Header row */}
          <div style={{padding:'10px 14px',background:q._checked?'#f0f4ff':'#f9fafb',display:'flex',alignItems:'flex-start',gap:10,cursor:'pointer'}}
            onClick={()=>updateParsed(idx,{_checked:!q._checked})}>
            <input type="checkbox" checked={q._checked} onChange={()=>{}} style={{marginTop:3,accentColor:'#3b5bdb',flexShrink:0}}/>
            <div style={{flex:1}}>
              <div className="fw6" style={{fontSize:14}}>{q.text}</div>
              <div className="flex gap4 mt4 flex-wrap">
                <span className="tag tag-blue">{q.format==='multi'?'Multi-select':q.format==='mc'?'MC':'Numeric'}</span>
                <span className={`tag ${q.difficulty==='Basic'?'tag-green':q.difficulty==='Conceptual'?'tag-yellow':'tag-gray'}`}>{q.difficulty}</span>
                {q.standards.length===0&&<span className="tag tag-gray" style={{color:'#dc2626',borderColor:'#fecaca',background:'#fff1f2'}}>⚠ No standard tagged</span>}
                {q.standards.map(sid=>{const s=standards.find(x=>x.id===sid);return s?<span key={sid} className="std-badge">{s.code}</span>:null;})}
              </div>
            </div>
            <button className="btn btn-secondary btn-sm" style={{flexShrink:0}} onClick={e=>{e.stopPropagation();setEditIdx(editIdx===idx?null:idx);}}>
              {editIdx===idx?'Close ▲':'Edit ▼'}
            </button>
          </div>

          {/* Expanded editor */}
          {editIdx===idx&&(
            <div style={{padding:'14px 16px',borderTop:'1px solid #e5e7eb',background:'#fff'}}>
              {/* Question text */}
              <label>Question text</label>
              <textarea className="input mt4 mb12" rows={2} value={q.text} onChange={e=>updateParsed(idx,{text:e.target.value})}/>

              {/* Format + Difficulty */}
              <div className="grid2 mb12" style={{gap:8}}>
                <div>
                  <label>Format</label>
                  <select className="select mt4" value={q.format} onChange={e=>updateParsed(idx,{format:e.target.value})}>
                    <option value="mc">Multiple choice (single)</option>
                    <option value="multi">Multiple select (all that apply)</option>
                    <option value="numeric">Numeric</option>
                  </select>
                </div>
                <div>
                  <label>Difficulty</label>
                  <select className="select mt4" value={q.difficulty} onChange={e=>updateParsed(idx,{difficulty:e.target.value})}>
                    <option>Basic</option>
                    <option>Conceptual</option>
                    <option>Applied</option>
                  </select>
                </div>
              </div>

              {/* Standards */}
              <label>Standards</label>
              <div className="flex flex-wrap gap6 mt4 mb12">
                {standards.map(s=>{const on=q.standards.includes(s.id);return(
                  <button key={s.id} onClick={()=>toggleStd(idx,s.id)} style={{padding:'3px 10px',borderRadius:20,fontSize:12,fontWeight:600,cursor:'pointer',border:'1.5px solid',borderColor:on?'#3b5bdb':'#d1d5db',background:on?'#dbeafe':'#f9fafb',color:on?'#1e40af':'#6b7280'}}>
                    {s.code} {s.title}
                  </button>
                );})}
              </div>

              {/* Choices editor for MC/multi */}
              {(q.format==='mc'||q.format==='multi')&&(
                <div>
                  <label>Choices {q.format==='multi'?'(check all correct)':'(select correct)'}</label>
                  <div className="mt4">
                    {q.choices.map((ch,ci)=>{
                      const isCor=q.format==='mc'?q.correct===ci:(q.correctMulti||[]).includes(ci);
                      return(
                        <div key={ci} className="flex gap8 mb6" style={{alignItems:'center'}}>
                          <div onClick={()=>{
                            if(q.format==='mc') updateParsed(idx,{correct:ci});
                            else{const cm=[...(q.correctMulti||[])];const i=cm.indexOf(ci);if(i>=0)cm.splice(i,1);else cm.push(ci);updateParsed(idx,{correctMulti:cm});}
                          }} style={{width:18,height:18,borderRadius:q.format==='mc'?'50%':'3px',border:`2px solid ${isCor?'#3b5bdb':'#d1d5db'}`,background:isCor?'#3b5bdb':'transparent',cursor:'pointer',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
                            {isCor&&<div style={{width:7,height:7,borderRadius:q.format==='mc'?'50%':'1px',background:'#fff'}}/>}
                          </div>
                          <input className="input" style={{flex:1}} value={ch} onChange={e=>{const chs=[...q.choices];chs[ci]=e.target.value;updateParsed(idx,{choices:chs});}}/>
                          {q.choices.length>2&&<button className="btn btn-ghost btn-xs" style={{color:'#dc2626'}} onClick={()=>{const chs=[...q.choices];chs.splice(ci,1);updateParsed(idx,{choices:chs});}}>✕</button>}
                        </div>
                      );
                    })}
                    <button className="btn btn-ghost btn-sm mt4" onClick={()=>updateParsed(idx,{choices:[...q.choices,'']})}>+ Add choice</button>
                  </div>
                </div>
              )}

              {/* Numeric */}
              {q.format==='numeric'&&(
                <div className="grid2 mt4" style={{gap:8}}>
                  <div><label>Correct answer</label><input className="input mt4" type="number" value={q.correct} onChange={e=>updateParsed(idx,{correct:Number(e.target.value)})}/></div>
                  <div><label>Tolerance (±)</label><input className="input mt4" type="number" value={q.tolerance||0.5} onChange={e=>updateParsed(idx,{tolerance:Number(e.target.value)})}/></div>
                </div>
              )}

              {/* Explanation */}
              <label className="mt12">Explanation for correct answer</label>
              <textarea className="input mt4" rows={2} value={q.explanation||''} onChange={e=>updateParsed(idx,{explanation:e.target.value})} placeholder="Why is the correct answer right?"/>
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

function AssessmentBuilderModal({assessment,standards,initQuestions,onSave,onSaveSettings,onClose}){
  const [view,setView]=useState('list'); // list | qform | pool
  const [localQs,setLocalQs]=useState(initQuestions);
  const [editQId,setEditQId]=useState(null);
  const [randomize,setRandomize]=useState(assessment.randomize||false);
  const [timeLimit,setTimeLimit]=useState(assessment.timeLimit||20);
  const [addTimeVal,setAddTimeVal]=useState(5);
  const [settingsSaved,setSettingsSaved]=useState(false);
  const [poolSettings,setPoolSettings]=useState(assessment.poolSettings||{});
  const [asmTitle,setAsmTitle]=useState(assessment.title||'');
  const [asmDesc,setAsmDesc]=useState(assessment.desc||'');
  const [editingTitle,setEditingTitle]=useState(false);
  const asmStandardIds=assessment.standards||standards.map(s=>s.id);
  const asmStds=standards.filter(s=>asmStandardIds.includes(s.id));


  const coverage={};
  asmStds.forEach(s=>{coverage[s.id]={Basic:0,Conceptual:0,Applied:0};});
  localQs.forEach(q=>{q.standards.forEach(sid=>{if(coverage[sid])coverage[sid][q.difficulty]=(coverage[sid][q.difficulty]||0)+1;});});
  const missing=[];
  asmStds.filter(s=>assessment.standards.includes(s.id)).forEach(s=>['Basic','Conceptual','Applied'].forEach(d=>{if(!(coverage[s.id]?.[d]))missing.push(`${s.code} ${d}`);}));

  if(view==='qform') return(
    <div>
      <button className="btn btn-ghost mb16" onClick={()=>{setView('list');setEditQId(null);}}>← Back to questions</button>
      <div className="fw7 mb16" style={{fontSize:17}}>{editQId?'Edit question':'New question'}</div>
      <QuestionForm
        initQ={editQId?localQs.find(q=>q.id===editQId):null}
        standards={standards}
        onSave={q=>{if(editQId)setLocalQs(prev=>prev.map(x=>x.id===editQId?q:x));else setLocalQs(prev=>[...prev,q]);setView('list');setEditQId(null);}}
        onCancel={()=>{setView('list');setEditQId(null);}}
      />
    </div>
  );

  return(
    <div>
      <button className="btn btn-ghost mb16" onClick={onClose}>← Back to units</button>
      <div className="flex-between mb16">
        <div style={{flex:1,marginRight:12}}>
          {editingTitle?(
            <div>
              <input className="input mb6" value={asmTitle} onChange={e=>setAsmTitle(e.target.value)}
                style={{fontSize:18,fontWeight:700,padding:'6px 10px'}} autoFocus
                onKeyDown={e=>{if(e.key==='Enter'){setEditingTitle(false);onSaveSettings({title:asmTitle,desc:asmDesc,randomize,timeLimit});}if(e.key==='Escape')setEditingTitle(false);}}
              />
              <input className="input mb6" value={asmDesc} onChange={e=>setAsmDesc(e.target.value)}
                placeholder="Description (optional)" style={{fontSize:13}}
                onKeyDown={e=>{if(e.key==='Enter'){setEditingTitle(false);onSaveSettings({title:asmTitle,desc:asmDesc,randomize,timeLimit});}}}
              />
              <div className="flex gap8">
                <button className="btn btn-primary btn-sm" onClick={()=>{setEditingTitle(false);onSaveSettings({title:asmTitle,desc:asmDesc,randomize,timeLimit});}}>Save name</button>
                <button className="btn btn-ghost btn-sm" onClick={()=>setEditingTitle(false)}>Cancel</button>
              </div>
            </div>
          ):(
            <div className="flex gap8" style={{alignItems:'center'}}>
              <div>
                <div className="fw7" style={{fontSize:18}}>{asmTitle}</div>
                {asmDesc&&<div className="text-sm text-muted">{asmDesc}</div>}
              </div>
              <button className="btn btn-ghost btn-sm" style={{color:'var(--muted)',fontSize:12}} onClick={()=>setEditingTitle(true)}>✏ Rename</button>
            </div>
          )}
        </div>
        <div className="flex gap8">
          <button className={`btn btn-sm ${view==='pool'?'btn-primary':'btn-secondary'}`} onClick={()=>setView(view==='pool'?'list':'pool')}>⚙ Pool settings</button>
          <button className="btn btn-secondary btn-sm" onClick={()=>{setView('qform');setEditQId(null);}}>+ Add question</button>

          <span className="text-xs fw7" style={{color:'#6b7280',textTransform:'uppercase',letterSpacing:'.5px'}}>Assessment settings</span>
          <div className="flex gap8 items-center">

            const pool=poolSettings[s.id]||{Basic:0,Conceptual:0,Applied:0};
            const counts={Basic:localQs.filter(q=>q.standards.includes(s.id)&&q.difficulty==='Basic').length,Conceptual:localQs.filter(q=>q.standards.includes(s.id)&&q.difficulty==='Conceptual').length,Applied:localQs.filter(q=>q.standards.includes(s.id)&&q.difficulty==='Applied').length};
            const totalDraw=(Number(pool.Basic)||0)+(Number(pool.Conceptual)||0)+(Number(pool.Applied)||0);
            return(
              <div key={s.id} style={{marginBottom:16,padding:'12px 14px',background:'#f8faff',borderRadius:10,border:'0.5px solid #c5d0f0'}}>

          </div>
        </div>

      <div className="card mb20">
        <div className="text-xs fw7 mb10" style={{color:'#6b7280',textTransform:'uppercase',letterSpacing:'.5px'}}>Coverage matrix</div>
        {missing.length>0&&<div className="info-box info-warn mb8">⚠ Missing: {missing.join(', ')}</div>}
        <table className="cov-table">
          <thead><tr><th style={{textAlign:'left'}}>Standard</th><th>Basic (1×)</th><th>Conceptual (2×)</th><th>Applied (3×)</th></tr></thead>

            {asmStds.filter(s=>assessment.standards.includes(s.id)).map(s=>(
              <tr key={s.id}><td style={{textAlign:'left'}}><span className="std-badge">{s.code}</span> {s.title}</td>

        <div className="flex gap8 mt14">

          {missing.length>0&&<button className="btn btn-secondary btn-sm" onClick={()=>onSave(localQs,true,{randomize,timeLimit})}>Override & publish anyway</button>}
          <button className="btn btn-ghost btn-sm" onClick={()=>onSave(localQs,false,{randomize,timeLimit})}>Save draft</button>
        </div>
      </div>

      {localQs.length===0&&<div className="card" style={{textAlign:'center',color:'#9ca3af',padding:28}}>No questions yet.</div>}
      {localQs.map((q,i)=>(
        <div key={q.id} style={{border:`1px solid ${q.isAiVariant?'#ddd6fe':'#e5e7eb'}`,borderRadius:10,padding:'11px 15px',marginBottom:8,background:q.isAiVariant?'#faf5ff':'#fff',display:'flex',gap:12,alignItems:'flex-start'}}>
          <div style={{width:26,height:26,borderRadius:7,background:q.isAiVariant?'#ede9fe':'#f0f0ff',color:q.isAiVariant?'#7c3aed':'#4F46E5',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:13,flexShrink:0}}>{i+1}</div>
          <div style={{flex:1}}>
            <div className="fw6" style={{fontSize:14}}>{q.text}</div>
            {q.image&&<img src={q.image} alt="" style={{maxHeight:50,borderRadius:5,marginTop:5,border:'1px solid #e5e7eb'}}/>}
            <div className="flex gap4 mt6 flex-wrap">
              <span className="tag tag-blue">{q.format==='multi'?'Multi-select':q.format==='mc'?'MC':'Numeric'}</span>
              <span className={`tag ${q.difficulty==='Basic'?'tag-green':q.difficulty==='Conceptual'?'tag-yellow':'tag-gray'}`}>{q.difficulty} ({WEIGHTS[q.difficulty]}×)</span>
              {q.standards.map(sid=>{const s=asmStds.find(x=>x.id===sid);return s?<span key={sid} className="std-badge">{s.code}</span>:null;})}
            </div>
          </div>
          <div className="flex gap4">
            <button className="btn btn-ghost btn-sm" onClick={()=>{setEditQId(q.id);setView('qform');}}>Edit</button>
            <button className="btn btn-ghost btn-sm" style={{color:'#dc2626'}} onClick={()=>setLocalQs(prev=>prev.filter(x=>x.id!==q.id))}>✕</button>
          </div>
        </div>
      ))}
    </div>
  );
}

// ASSESSMENT GATING SETTINGS

function AssessmentGateSettings({assessment,units,onChange}){
  const allAsms=units.flatMap(u=>u.assessments).filter(a=>a.id!==assessment.id);
  return(
    <div style={{borderTop:'1px solid #f3f4f6',paddingTop:14,marginTop:14}}>
      <div className="fw6 text-sm mb10">Assessment unlock gate</div>
      <div className="grid2" style={{gap:8}}>
        <div><label>Prerequisite assessment</label>
          <select className="select mt4" value={assessment.prerequisiteId||''} onChange={e=>onChange({prerequisiteId:e.target.value||null})}>
            <option value="">None (always unlocked)</option>
            {allAsms.map(a=><option key={a.id} value={a.id}>{a.title}</option>)}
          </select></div>
        <div><label>Minimum grade to unlock (%)</label>
          <input className="input mt4" type="number" min="0" max="100" value={assessment.prerequisiteGrade||0} onChange={e=>onChange({prerequisiteGrade:Math.min(100,Math.max(0,Number(e.target.value)))})} disabled={!assessment.prerequisiteId}/>

}

// UNITS MANAGER
// ═══════════════════════════════════════════════════════════
function UnitsManager({standards,units,questions,setUnits,setQuestions,updateCourse}){
  const [openBuilder,setOpenBuilder]=useState(null);
  const [showNewUnit,setShowNewUnit]=useState(false);
  const [newUnitForm,setNewUnitForm]=useState({name:'',desc:''});
  const [showNewAsm,setShowNewAsm]=useState({});
  const [newAsmForms,setNewAsmForms]=useState({});

  function addUnit(){if(!newUnitForm.name)return;setUnits(prev=>[...prev,{id:'u'+Date.now(),name:newUnitForm.name,desc:newUnitForm.desc,collapsed:false,assessments:[]}]);setNewUnitForm({name:'',desc:''});setShowNewUnit(false);}
  function addAsm(uid){const f=newAsmForms[uid]||{};if(!f.title)return;const a={id:'a'+Date.now(),title:f.title,desc:f.desc||'',timeLimit:Number(f.timeLimit)||20,standards:standards.map(s=>s.id),questionIds:[],published:false,randomize:false,prerequisiteId:null,prerequisiteGrade:0};setUnits(prev=>prev.map(u=>u.id===uid?{...u,assessments:[...u.assessments,a]}:u));setNewAsmForms(p=>({...p,[uid]:{}}));setShowNewAsm(p=>({...p,[uid]:false}));}
  function updateAsm(uid,aid,patch){
    setUnits(prev=>prev.map(u=>u.id===uid?{...u,assessments:u.assessments.map(a=>a.id===aid?{...a,...patch}:a)}:u));
  }

  function handleBuilderSave(uid,aid,newQs,publish,settings){
    const newIds=newQs.map(q=>q.id);
    // Merge: keep all existing course questions PLUS all questions from builder
    // This ensures pasted questions are never lost
    const existingOther=questions.filter(q=>!newIds.includes(q.id));
    const mergedQuestions=[...existingOther,...newQs];
    const updatedUnits=units.map(u=>u.id===uid?{...u,assessments:u.assessments.map(a=>a.id===aid?{...a,questionIds:newQs.map(q=>q.id),published:publish??a.published,randomize:settings?.randomize??a.randomize,timeLimit:settings?.timeLimit??a.timeLimit}:a)}:u);
    // Save both in one atomic call
    if(updateCourse){
      updateCourse({questions:mergedQuestions,units:updatedUnits});
    } else {
      setQuestions(mergedQuestions);
      setUnits(updatedUnits);
    }
    setOpenBuilder(null);
  }

  if(openBuilder){
    const unit=units.find(u=>u.id===openBuilder.uid);
    const asm=unit?.assessments.find(a=>a.id===openBuilder.aid);
    if(!asm) return null;
    // Load questions linked to this assessment — use string compare for safety
    const asmQs=questions.filter(q=>(asm.questionIds||[]).map(String).includes(String(q.id)));
    return(
      <div>
        <AssessmentBuilderModal assessment={asm} standards={standards} initQuestions={asmQs}
          onSave={(qs,pub,settings)=>handleBuilderSave(openBuilder.uid,openBuilder.aid,qs,pub,settings)}
          onSaveSettings={settings=>updateAsm(openBuilder.uid,openBuilder.aid,settings)}
          onClose={()=>setOpenBuilder(null)}
        />
        <div className="card mt16">
          <AssessmentGateSettings assessment={asm} units={units} onChange={patch=>updateAsm(openBuilder.uid,openBuilder.aid,patch)}/>
        </div>
      </div>
    );
  }

  return(
    <div>
      <div className="flex-between mb16">
        <div><div className="section-title">Assessments</div><div className="section-sub" style={{marginBottom:0}}>Organize by unit. Set unlock rules per assessment.</div></div>
        <button className="btn btn-primary btn-sm" onClick={()=>setShowNewUnit(true)}>+ New unit</button>
      </div>
      {showNewUnit&&(
        <div className="card mb16" style={{border:'1.5px solid #a5b4fc'}}>
          <div className="fw6 mb12">New unit</div>
          <label>Unit name</label><input className="input mt4 mb8" value={newUnitForm.name} onChange={e=>setNewUnitForm(f=>({...f,name:e.target.value}))} placeholder="Unit 3: Integrals"/>
          <label>Description (optional)</label><input className="input mt4 mb12" value={newUnitForm.desc} onChange={e=>setNewUnitForm(f=>({...f,desc:e.target.value}))} placeholder="Brief description…"/>
          <div className="flex gap8"><button className="btn btn-primary btn-sm" onClick={addUnit}>Create unit</button><button className="btn btn-ghost btn-sm" onClick={()=>setShowNewUnit(false)}>Cancel</button></div>
        </div>
      )}
      {units.length===0&&!showNewUnit&&<div className="card" style={{textAlign:'center',color:'#9ca3af',padding:36}}>No units yet. Click "+ New unit" to get started.</div>}
      {units.map(unit=>(
        <div key={unit.id} className="unit-card">
          <div className="unit-hdr" onClick={()=>setUnits(prev=>prev.map(u=>u.id===unit.id?{...u,collapsed:!u.collapsed}:u))}>
            <div style={{flex:1}}><div className="fw7" style={{fontSize:16}}>{unit.name}</div>{unit.desc&&<div className="text-sm text-muted">{unit.desc}</div>}</div>
            <div className="flex gap8">
              <span className="tag tag-gray">{unit.assessments.length} assessment{unit.assessments.length!==1?'s':''}</span>
              <span className="text-muted" style={{fontSize:13}}>{unit.collapsed?'▼':'▲'}</span>
              <button className="btn btn-ghost btn-sm" style={{color:'#dc2626'}} onClick={e=>{e.stopPropagation();if(window.confirm('Delete this unit?'))setUnits(prev=>prev.filter(u=>u.id!==unit.id));}}>✕</button>
            </div>
          </div>
          {!unit.collapsed&&(
            <div className="unit-body">
              {unit.assessments.length===0&&<div className="text-sm text-muted" style={{padding:'6px 0 12px'}}>No assessments yet.</div>}
              {unit.assessments.map(asm=>{
                const qCount=asm.questionIds.length;
                const prereqAsm=asm.prerequisiteId?units.flatMap(u=>u.assessments).find(a=>a.id===asm.prerequisiteId):null;
                return(
                  <div key={asm.id} className="asm-card">
                    <div style={{flex:1}}>
                      <div className="fw6" style={{fontSize:15}}>{asm.title}</div>
                      {asm.desc&&<div className="text-sm text-muted mt4">{asm.desc}</div>}
                      <div className="flex gap6 mt6 flex-wrap">
                        <span className="tag tag-gray">⏱ {asm.timeLimit} min</span>
                        <span className="tag tag-gray">{qCount} Q</span>
                        {asm.randomize&&<span className="tag tag-blue">🔀</span>}
                        <span className={`tag ${asm.published?'tag-green':'tag-yellow'}`}>{asm.published?'Published':'Draft'}</span>
                        {prereqAsm&&<span className="tag tag-purple">🔒 Requires {asm.prerequisiteGrade||0}% on "{prereqAsm.title}"</span>}
                      </div>
                    </div>
                    <div className="flex gap6">
                      <button className="btn btn-primary btn-sm" onClick={()=>setOpenBuilder({uid:unit.id,aid:asm.id})}>Open builder</button>
                      <button className="btn btn-ghost btn-sm" style={{color:'#dc2626'}} onClick={()=>setUnits(prev=>prev.map(u=>u.id===unit.id?{...u,assessments:u.assessments.filter(a=>a.id!==asm.id)}:u))}>✕</button>
                    </div>
                  </div>
                );
              })}
              {showNewAsm[unit.id]?(
                <div style={{border:'1px dashed #c7d2fe',borderRadius:10,padding:'14px 16px',background:'#f8f7ff',marginTop:8}}>
                  <div className="fw6 mb10">New assessment</div>
                  <div className="grid2" style={{gap:8}}>
                    <div style={{gridColumn:'span 2'}}><label>Title</label><input className="input mt4" value={newAsmForms[unit.id]?.title||''} onChange={e=>setNewAsmForms(p=>({...p,[unit.id]:{...p[unit.id],title:e.target.value}}))} placeholder="Week 5 Quiz"/></div>
                    <div><label>Description</label><input className="input mt4" value={newAsmForms[unit.id]?.desc||''} onChange={e=>setNewAsmForms(p=>({...p,[unit.id]:{...p[unit.id],desc:e.target.value}}))} placeholder="Optional…"/></div>
                    <div><label>Time limit (min)</label><input className="input mt4" type="number" value={newAsmForms[unit.id]?.timeLimit||'20'} onChange={e=>setNewAsmForms(p=>({...p,[unit.id]:{...p[unit.id],timeLimit:e.target.value}}))}/></div>
                  </div>
                  <div className="flex gap8 mt12"><button className="btn btn-primary btn-sm" onClick={()=>addAsm(unit.id)}>Create</button><button className="btn btn-ghost btn-sm" onClick={()=>setShowNewAsm(p=>({...p,[unit.id]:false}))}>Cancel</button></div>
                </div>
              ):(
                <button className="btn btn-secondary btn-sm mt8" onClick={()=>setShowNewAsm(p=>({...p,[unit.id]:true}))}>+ Add assessment</button>
              )}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

// SVG CHART HELPERS
// ═══════════════════════════════════════════════════════════
function BarChart({data,width=480,height=180,colorFn}){
  // data = [{label, value, max}]
  if(!data||!data.length) return null;
  const barH=Math.floor((height-40)/data.length)-6;
  const labelW=130;
  const barMaxW=width-labelW-60;
  return(
    <svg width={width} height={height} style={{display:'block',overflow:'visible'}}>
      {data.map((d,i)=>{
        const y=i*(barH+6)+4;
        const val=Math.max(0,Math.min(100,d.value??0));
        const barW=Math.round((val/100)*barMaxW);
        const col=colorFn?colorFn(val):(val>=85?'#16a34a':val>=60?'#ca8a04':'#dc2626');
        const bg=colorFn?colorFn(val,true):(val>=85?'#dcfce7':val>=60?'#fef9c3':'#fee2e2');
        return(
          <g key={i}>
            <text x={labelW-6} y={y+barH/2+4} textAnchor="end" fontSize={10} fill="#374151" fontFamily="system-ui,sans-serif">{d.label}</text>
            <rect x={labelW} y={y} width={barMaxW} height={barH} fill="#f3f4f6" rx={4}/>
            {barW>0&&<rect x={labelW} y={y} width={barW} height={barH} fill={col} rx={4}/>}
            <text x={labelW+barW+6} y={y+barH/2+4} fontSize={10} fill={col} fontWeight="700" fontFamily="system-ui,sans-serif">{Math.round(val)}%</text>
          </g>
        );
      })}
    </svg>
  );
}

function RadarSummary({scores,labels}){
  // Simple horizontal mastery summary bar
  const green=scores.filter(s=>s!==null&&s>=0.85).length;
  const yellow=scores.filter(s=>s!==null&&s>=0.60&&s<0.85).length;
  const red=scores.filter(s=>s!==null&&s<0.60).length;
  const total=scores.length;
  return(
    <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
      {[['Mastery','#16a34a','#dcfce7',green],['Satisfactory','#ca8a04','#fef9c3',yellow],['Needs Review','#dc2626','#fee2e2',red],['Not tested','#6b7280','#f3f4f6',total-green-yellow-red]].map(([label,color,bg,n])=>(
        <div key={label} style={{flex:1,minWidth:100,background:bg,border:`1px solid ${color}22`,borderRadius:8,padding:'10px 12px',textAlign:'center'}}>
          <div style={{fontSize:24,fontWeight:800,color}}>{n}</div>
          <div style={{fontSize:11,color,fontWeight:600}}>{label}</div>
        </div>
      ))}
    </div>
  );
}

function AttemptScoreChart({attempts,questions,title}){
  // Line of scores over attempts
  if(!attempts.length) return null;
  const scores=attempts.map(att=>{
    const qs=questions.filter(q=>att.answers.hasOwnProperty(q.id));
    const {overall}=scoreAttempt(att,qs);
    return overall.total>0?Math.round(overall.earned/overall.total*100):0;
  });
  const W=400,H=100,pad=30;
  const maxVal=100;
  const pts=scores.map((s,i)=>{
    const x=pad+(i/(Math.max(scores.length-1,1)))*(W-pad*2);
    const y=H-pad-(s/maxVal)*(H-pad*2);
    return{x,y,s};
  });
  const pathD=pts.map((p,i)=>`${i===0?'M':'L'}${p.x},${p.y}`).join(' ');
  return(
    <svg width={W} height={H} style={{display:'block'}}>
      {/* Gridlines */}
      {[0,25,50,75,100].map(v=>{
        const y=H-pad-(v/100)*(H-pad*2);
        return<g key={v}><line x1={pad} y1={y} x2={W-pad} y2={y} stroke="#e5e7eb" strokeWidth={1}/><text x={pad-4} y={y+4} fontSize={9} textAnchor="end" fill="#9ca3af">{v}%</text></g>;
      })}
      {/* 60% and 85% threshold lines */}
      {[{v:60,col:'#ca8a04'},{v:85,col:'#16a34a'}].map(({v,col})=>{
        const y=H-pad-(v/100)*(H-pad*2);
        return<line key={v} x1={pad} y1={y} x2={W-pad} y2={y} stroke={col} strokeWidth={1} strokeDasharray="4,3" opacity={0.6}/>;
      })}
      {pts.length>1&&<path d={pathD} fill="none" stroke="#4F46E5" strokeWidth={2}/>}
      {pts.map((p,i)=>(
        <g key={i}>
          <circle cx={p.x} cy={p.y} r={4} fill="#4F46E5"/>
          <text x={p.x} y={p.y-7} fontSize={9} textAnchor="middle" fill="#374151" fontWeight="600">{p.s}%</text>
          <text x={p.x} y={H-4} fontSize={8} textAnchor="middle" fill="#9ca3af">A{i+1}</text>
        </g>
      ))}
    </svg>
  );
}

// ── Print: Student Course Report ──────────────────────────────
function printStudentCourseReport({student,course,attempts,questions,standards,units}){
  const myAttempts=attempts.filter(a=>a.studentId===student.id);
  const best=bestMastery(myAttempts,student.id,questions);

// Helper: render bar chart to SVG string
function renderToSVGString(data,height=180){
  if(!data||!data.length) return '';
  const width=520;
  const barH=Math.max(16,Math.floor((height-20)/data.length)-5);
  const labelW=140;
  const barMaxW=width-labelW-55;
  const rows=data.map((d,i)=>{
    const y=i*(barH+5)+4;
    const val=Math.max(0,Math.min(100,d.value??0));
    const barW=Math.round((val/100)*barMaxW);
    const col=val>=85?'#16a34a':val>=60?'#ca8a04':'#dc2626';
    return `<text x="${labelW-6}" y="${y+barH/2+4}" text-anchor="end" font-size="10" fill="#374151" font-family="system-ui,sans-serif">${d.label}</text>
    <rect x="${labelW}" y="${y}" width="${barMaxW}" height="${barH}" fill="#f3f4f6" rx="4"/>
    ${barW>0?`<rect x="${labelW}" y="${y}" width="${barW}" height="${barH}" fill="${col}" rx="4"/>`:''}
    <text x="${labelW+barW+6}" y="${y+barH/2+4}" font-size="10" fill="${col}" font-weight="700" font-family="system-ui,sans-serif">${Math.round(val)}%</text>`;
  }).join('');
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}">${rows}</svg>`;
}
