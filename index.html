// STUDENT: ASSESSMENT TAKER
// ═══════════════════════════════════════════════════════════
function AssessmentTaker({assessment,questions,standards,videos,studentName,studentId,onSubmit,onCancel}){
  const [phase,setPhase]=useState('prestart');
  const [answers,setAnswers]=useState({});
  const [curQ,setCurQ]=useState(0);
  const [timeLeft,setTimeLeft]=useState(assessment.timeLimit*60);
  const [expired,setExpired]=useState(false);
  const [attempt,setAttempt]=useState(null);
  const [expandedStd,setExpandedStd]=useState(null);
  const timerRef=useRef(null);

  const asmStds=standards.filter(s=>assessment.standards.includes(s.id));

  useEffect(()=>{
    if(phase==='taking'){timerRef.current=setInterval(()=>{setTimeLeft(t=>{if(t<=1){clearInterval(timerRef.current);setExpired(true);return 0;}return t-1;});},1000);}
    return()=>clearInterval(timerRef.current);
  },[phase]);
  useEffect(()=>{if(expired&&phase==='taking')doSubmit(true);},[expired]);

  function doSubmit(auto=false){
    clearInterval(timerRef.current);
    const att={id:'at'+Date.now(),studentId,studentName,assessmentId:assessment.id,answers:{...answers},submittedAt:new Date().toISOString(),timeExpired:auto};
    setAttempt(att);onSubmit(att);setPhase('results');
  }

  function toggleMulti(qid,idx){
    setAnswers(prev=>{const cur=Array.isArray(prev[qid])?[...prev[qid]]:[];const i=cur.indexOf(idx);if(i>=0)cur.splice(i,1);else cur.push(idx);return{...prev,[qid]:cur};});
  }

  function isAnswered(q){
    if(!answers.hasOwnProperty(q.id))return false;
    if(q.format==='multi')return Array.isArray(answers[q.id])&&answers[q.id].length>0;
    return true;
  }

  const mins=Math.floor(timeLeft/60),secs=timeLeft%60;
  const pct=timeLeft/(assessment.timeLimit*60);
  const timerCls=pct>0.25?'timer-normal':pct>0.10?'timer-yellow':'timer-red';

  if(phase==='prestart') return(
    <div style={{maxWidth:540,margin:'0 auto'}}>
      <div className="card" style={{padding:32}}>
        <div className="fw7" style={{fontSize:22,marginBottom:6}}>{assessment.title}</div>
        <div className="text-muted mb20">{assessment.desc}</div>
        <div className="grid2 mb20" style={{gap:8}}>
          {[['Questions',questions.length],['Time limit',assessment.timeLimit+' min']].map(([k,v])=>(
            <div key={k} style={{background:'#f4f3ef',borderRadius:10,padding:'14px',textAlign:'center'}}>
              <div className="text-xs text-muted" style={{textTransform:'uppercase',letterSpacing:'.5px'}}>{k}</div>
              <div style={{fontSize:26,fontWeight:700,color:'#4F46E5',marginTop:2}}>{v}</div>
            </div>
          ))}
        </div>
        {asmStds.length>0&&(
          <div className="mb20">
            <div className="fw6 text-sm mb8">Standards covered</div>
            {asmStds.map(s=>(
              <div key={s.id} style={{padding:'7px 0',borderBottom:'1px solid #f3f4f6',fontSize:14,display:'flex',alignItems:'center',gap:8}}>
                <span className="std-badge">{s.code}</span>{s.title}
              </div>
            ))}
          </div>
        )}
        <div className="flex gap8">
          <button className="btn btn-primary" style={{flex:1,padding:12,fontSize:15,justifyContent:'center'}} onClick={()=>setPhase('taking')}>Begin assessment</button>
          <button className="btn btn-secondary" onClick={onCancel}>Cancel</button>
        </div>
      </div>
    </div>
  );

  if(phase==='taking'){
    const q=questions[curQ];
    const multiAns=Array.isArray(answers[q.id])?answers[q.id]:[];
    // Compute display order for choices (stable shuffle per question if randomizeChoices is on)
    const rawIdxs=(q.choices||[]).map((_,i)=>i);
    const displayIdxs=q.randomizeChoices
      ?[...rawIdxs].sort((a,b)=>{const seed=(q.id||'').split('').reduce((s,ch)=>s+ch.charCodeAt(0),0);return Math.sin(seed*(a+1))-Math.sin(seed*(b+1));})
      :rawIdxs;
    return(
      <div style={{maxWidth:680,margin:'0 auto'}}>
        <div className="flex-between mb20" style={{gap:8}}>
          <div className="fw6" style={{fontSize:15}}>{assessment.title}</div>
          <div className={`timer-box ${timerCls}`}>{String(mins).padStart(2,'0')}:{String(secs).padStart(2,'0')}</div>
        </div>
        <div className="q-strip">
          {questions.map((_,i)=><button key={i} className={`q-num ${isAnswered(questions[i])?'answered':''} ${i===curQ?'current':''}`} onClick={()=>setCurQ(i)}>{i+1}</button>)}
        </div>
        <div className="card" style={{padding:28}}>
          <div className="flex-between mb16">
            <span className="text-sm text-muted">Question {curQ+1} of {questions.length}</span>
            <div className="flex gap4">
              {q.standards.map(sid=>{const s=asmStds.find(x=>x.id===sid);return s?<span key={sid} className="std-badge">{s.code}</span>:null;})}
              <span className={`tag ${q.difficulty==='Basic'?'tag-green':q.difficulty==='Conceptual'?'tag-yellow':'tag-gray'}`}>{q.difficulty}</span>
              {q.format==='multi'&&<span className="tag tag-purple">Select all that apply</span>}
            </div>
          </div>
          <div style={{fontSize:17,fontWeight:500,marginBottom:q.image?12:22,lineHeight:1.6}}>{q.text}</div>
          {q.image&&<img src={q.image} alt="Q" style={{maxWidth:'100%',maxHeight:220,borderRadius:8,border:'1px solid #e5e7eb',display:'block',marginBottom:20,objectFit:'contain'}}/>}
          {q.format==='mc'&&displayIdxs.map(i=>(
            <button key={i} className={`opt-btn ${answers[q.id]===i?'selected':''}`} onClick={()=>setAnswers(a=>({...a,[q.id]:i}))}>
              <span style={{width:22,height:22,borderRadius:'50%',border:`2px solid ${answers[q.id]===i?'#4F46E5':'#d1d5db'}`,background:answers[q.id]===i?'#4F46E5':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                {answers[q.id]===i&&<span style={{width:7,height:7,borderRadius:'50%',background:'#fff'}}/>}
              </span>{q.choices[i]}
            </button>
          ))}
          {q.format==='multi'&&displayIdxs.map(i=>{const sel=multiAns.includes(i);return(
            <button key={i} className={`opt-btn ${sel?'selected':''}`} onClick={()=>toggleMulti(q.id,i)} style={{borderColor:sel?'#7c3aed':'#e5e7eb',background:sel?'#faf5ff':'#fff'}}>
              <span style={{width:22,height:22,borderRadius:4,border:`2px solid ${sel?'#7c3aed':'#d1d5db'}`,background:sel?'#7c3aed':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:12,color:'#fff',fontWeight:700}}>{sel?'✓':''}</span>{q.choices[i]}
            </button>
          );})}
          {q.format==='numeric'&&<input className="input" type="number" style={{maxWidth:200,fontSize:16}} value={answers[q.id]||''} onChange={e=>setAnswers(a=>({...a,[q.id]:e.target.value}))} placeholder="Enter answer"/>}
        </div>
        <div className="flex-between mt16">
          <button className="btn btn-secondary" disabled={curQ===0} onClick={()=>setCurQ(i=>i-1)}>← Previous</button>
          {curQ<questions.length-1?<button className="btn btn-primary" onClick={()=>setCurQ(i=>i+1)}>Next →</button>:<button className="btn btn-primary" style={{background:'#16a34a',borderColor:'#16a34a'}} onClick={()=>doSubmit()}>Submit</button>}
        </div>
      </div>
    );
  }

  // Results
  if(!attempt) return null;
  const {stdScores,overall}=scoreAttempt(attempt,questions);
  const msgs={green:"You've mastered this — move on.",yellow:'Close — review before moving on.',red:'Revisit course materials for this objective.',untested:'No questions on this standard.'};

  return(
    <div style={{maxWidth:680,margin:'0 auto'}}>
      {attempt.timeExpired&&<div className="info-box info-warn mb16">Time ran out — you may want to pace differently next time.</div>}
      <div className="card mb24" style={{textAlign:'center',padding:'24px'}}>
        <div className="text-xs text-muted" style={{textTransform:'uppercase',letterSpacing:'.5px',marginBottom:4}}>Overall score</div>
        <div style={{fontSize:32,fontWeight:800,color:'#374151'}}>{overall.earned}/{overall.total}</div>
        <div className="text-sm text-muted">{overall.total>0?Math.round(overall.earned/overall.total*100):0}% correct</div>
        <button className="print-btn no-print mt12" onClick={()=>printAssessmentReport({student:{id:studentId,name:studentName},attempt,assessment,questions,standards})}>
          🖨 Download / Print PDF
        </button>
      </div>
      <div className="fw7 mb12" style={{fontSize:18}}>Mastery by standard</div>
      {asmStds.map(s=>{
        const score=stdScores[s.id];const level=masteryLevel(score);
        const missed=questions.filter(q=>q.standards.includes(s.id)&&attempt.answers.hasOwnProperty(q.id)).filter(q=>!isCorrect(q,attempt.answers[q.id]));
        const recVids=videos.filter(v=>v.standards.includes(s.id));
        return(
          <div key={s.id} className="results-row">
            <div className="results-hdr" onClick={()=>setExpandedStd(expandedStd===s.id?null:s.id)}>
              <div className="flex gap10"><span className="std-badge">{s.code}</span><span className="fw6" style={{fontSize:15}}>{s.title}</span></div>
              <div className="flex gap10"><MasteryCell score={score}/><span className="text-muted" style={{fontSize:14}}>{expandedStd===s.id?'▲':'▼'}</span></div>
            </div>
            {expandedStd===s.id&&(
              <div className="results-body">
                <div className="text-sm mb12" style={{color:{green:'#166534',yellow:'#854d0e',red:'#991b1b',untested:'#6b7280'}[level]}}>{msgs[level]}</div>
                {missed.length>0&&(
                  <div className="mb12">
                    <div className="fw6 text-sm mb8">Questions to review</div>
                    {missed.map(q=>{
                      const studentAns=attempt.answers[q.id];
                      const wrongExp=q.wrongExplanations&&(q.format==='mc'?q.wrongExplanations[Number(studentAns)]:null);
                      return(
                        <div key={q.id} style={{background:'#fff',border:'1px solid #fecaca',borderRadius:8,padding:'12px',marginBottom:8}}>
                          <div className="fw6 text-sm mb6">{q.text}</div>
                          {q.image&&<img src={q.image} alt="" style={{maxHeight:70,borderRadius:6,marginBottom:8,border:'1px solid #e5e7eb'}}/>}
                          {q.format==='mc'&&<div className="text-sm mb4" style={{color:'#16a34a'}}>✓ Correct: {q.choices[q.correct]}</div>}
                          {q.format==='multi'&&<div className="text-sm mb4" style={{color:'#16a34a'}}>✓ Correct: {(q.correctMulti||[]).map(i=>q.choices[i]).join(', ')}</div>}
                          {q.format==='numeric'&&<div className="text-sm mb4" style={{color:'#16a34a'}}>✓ Correct: {q.correct} (±{q.tolerance||0.5})</div>}
                          {q.explanation&&<div className="text-sm text-muted" style={{background:'#f4f3ef',borderRadius:6,padding:'7px',marginBottom:6}}><strong>Why correct:</strong> {q.explanation}</div>}
                          {wrongExp&&<div className="text-sm" style={{background:'#fffbeb',borderRadius:6,padding:'7px',border:'1px solid #fde68a',color:'#92400e'}}><strong>Why your answer was wrong:</strong> {wrongExp}</div>}
                          {q.format==='multi'&&Array.isArray(studentAns)&&studentAns.filter(i=>!(q.correctMulti||[]).includes(i)).map(i=>(q.wrongExplanations||{})[i]).filter(Boolean).map((exp,ei)=>(
                            <div key={ei} className="text-sm mt4" style={{background:'#fffbeb',borderRadius:6,padding:'7px',border:'1px solid #fde68a',color:'#92400e'}}><strong>Wrong choice:</strong> {exp}</div>
                          ))}
                          {q.format==='numeric'&&(q.wrongExplanations||{})['numeric']&&<div className="text-sm mt4" style={{background:'#fffbeb',borderRadius:6,padding:'7px',border:'1px solid #fde68a',color:'#92400e'}}><strong>Hint:</strong> {(q.wrongExplanations||{})['numeric']}</div>}
                        </div>
                      );
                    })}
                  </div>
                )}
                {recVids.length>0&&(
                  <div>
                    <div className="fw6 text-sm mb8">{level==='red'||level==='yellow'?'Recommended videos':'Additional resources'}</div>
                    {recVids.map(v=>(
                      <div key={v.id} className="video-card" style={{marginBottom:6}}>
                        <div className="video-thumb">{v.thumb||'▶'}</div>
                        <div style={{flex:1}}><div className="fw6 text-sm">{v.title}</div>{v.desc&&<div className="text-xs text-muted mt4">{v.desc}</div>}</div>
                        <a href={v.url} target="_blank" rel="noreferrer" className="btn btn-ghost btn-sm" style={{color:'#4F46E5',whiteSpace:'nowrap'}}>Watch →</a>
                      </div>
                    ))}
                  </div>
                )}
                {missed.length===0&&level!=='untested'&&recVids.length===0&&<div className="text-sm" style={{color:'#16a34a'}}>✓ No questions missed on this standard.</div>}
              </div>
            )}
          </div>
        );
      })}
      <div className="fw7 mb12 mt24" style={{fontSize:18}}>Full question review</div>
      {questions.map((q,qi)=>{
        const ans=attempt.answers[q.id];
        const credit=partialCredit(q,ans);
        const correct=credit===1;
        const partial=credit>0&&credit<1;
        const ansText=q.format==='mc'?(q.choices[Number(ans)]||'No answer'):q.format==='multi'?(Array.isArray(ans)&&ans.length>0?ans.map(i=>q.choices[i]).join(', '):'No answer'):String(ans??'No answer');
        const corrText=q.format==='mc'?q.choices[q.correct]:q.format==='multi'?(q.correctMulti||[]).map(i=>q.choices[i]).join(', '):String(q.correct);
        return(
          <div key={q.id} style={{border:`1px solid ${correct?'#bbf7d0':partial?'#fde68a':'#fecaca'}`,borderRadius:12,padding:16,marginBottom:10,background:correct?'#f0fdf4':partial?'#fefce8':'#fff1f2'}}>
            <div className="flex-between mb8">
              <span style={{fontWeight:700,fontSize:13,color:'#6b7280'}}>Q{qi+1} · {q.difficulty}</span>
              <span style={{fontWeight:700,fontSize:13,color:correct?'#166534':partial?'#854d0e':'#991b1b'}}>
                {correct?'✓ Correct':partial?'◐ Partial ('+Math.round(credit*100)+'%)':'✗ Incorrect'}
              </span>
            </div>
            <div className="fw6 mb8" style={{fontSize:15}}>{q.text}</div>
            {q.image&&<img src={q.image} alt="" style={{maxHeight:80,borderRadius:8,marginBottom:8,border:'1px solid #e5e7eb'}}/>}
            {!correct&&(
              <div style={{marginBottom:8}}>
                <div className="text-sm mb4" style={{color:'#991b1b'}}><strong>Your answer:</strong> {ansText}</div>
                <div className="text-sm mb4" style={{color:'#166534'}}><strong>Correct answer:</strong> {corrText}</div>
              </div>
            )}
            {correct&&<div className="text-sm mb4" style={{color:'#166534'}}><strong>Your answer:</strong> {ansText} ✓</div>}
            {q.explanation&&<div className="text-sm" style={{background:'rgba(0,0,0,.04)',borderRadius:7,padding:'8px 10px',marginBottom:6}}><strong>Explanation:</strong> {q.explanation}</div>}
            {q.format==='mc'&&!correct&&(q.wrongExplanations||{})[Number(ans)]&&(
              <div className="text-sm" style={{background:'#fef9c3',borderRadius:7,padding:'8px 10px',border:'1px solid #fde68a',color:'#854d0e'}}><strong>Why your answer was wrong:</strong> {q.wrongExplanations[Number(ans)]}</div>
            )}
            {q.format==='numeric'&&!correct&&(q.wrongExplanations||{})['numeric']&&(
              <div className="text-sm" style={{background:'#fef9c3',borderRadius:7,padding:'8px 10px',border:'1px solid #fde68a',color:'#854d0e'}}><strong>Hint:</strong> {q.wrongExplanations['numeric']}</div>
            )}
          </div>
        );
      })}
      <button className="btn btn-primary mt16" style={{width:'100%',padding:12,justifyContent:'center',fontSize:15}} onClick={()=>{setAnswers({});setCurQ(0);setTimeLeft(assessment.timeLimit*60);setExpired(false);setPhase('prestart');}}>Retake assessment</button>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// ATTEMPT REVIEW (student views past attempt)
// ═══════════════════════════════════════════════════════════
function AttemptReview({attempt,questions,assessment,standards,onBack}){
  const {stdScores,overall}=scoreAttempt(attempt,questions);
  const pct=overall.total>0?Math.round(overall.earned/overall.total*100):0;
  const asmStds=standards.filter(s=>(assessment?.standards||[]).includes(s.id));
  return(
    <div style={{maxWidth:680,margin:'0 auto'}}>
      <button className="btn btn-ghost mb16" onClick={onBack}>← Back to my progress</button>
      <div className="card mb16" style={{padding:24}}>
        <div className="fw7 mb4" style={{fontSize:18}}>{assessment?.title||'Assessment'} — Review</div>
        <div className="text-sm text-muted mb16">{new Date(attempt.submittedAt).toLocaleString()}{attempt.timeExpired?' · Time expired':''}</div>
        <div className="flex gap16 flex-wrap">
          <div style={{textAlign:'center'}}>
            <div style={{fontSize:32,fontWeight:800,color:pct>=85?'#166534':pct>=60?'#854d0e':'#991b1b'}}>{pct}%</div>
            <div className="text-xs text-muted">Overall score</div>
          </div>
          <div style={{textAlign:'center'}}>
            <div style={{fontSize:32,fontWeight:800,color:'#374151'}}>{overall.earned}/{overall.total}</div>
            <div className="text-xs text-muted">Questions correct</div>
          </div>
        </div>
      </div>
      {asmStds.length>0&&(
        <div className="card mb16">
          <div className="fw6 mb12">Performance by standard</div>
          {asmStds.map(s=>(
            <div key={s.id} className="flex-between" style={{padding:'8px 0',borderBottom:'0.5px solid #f3f4f6'}}>
              <div><span className="std-badge">{s.code}</span> <span style={{fontSize:14}}>{s.title}</span></div>
              <MasteryCell score={stdScores[s.id]}/>
            </div>
          ))}
        </div>
      )}
      <div className="fw7 mb12" style={{fontSize:18}}>Question by question</div>
      {questions.map((q,qi)=>{
        const ans=attempt.answers[q.id];
        const credit=partialCredit(q,ans);
        const correct=credit===1;
        const partial=credit>0&&credit<1;
        const ansText=q.format==='mc'?(q.choices[Number(ans)]||'No answer'):q.format==='multi'?(Array.isArray(ans)&&ans.length>0?ans.map(i=>q.choices[i]).join(', '):'No answer'):String(ans??'No answer');
        const corrText=q.format==='mc'?q.choices[q.correct]:q.format==='multi'?(q.correctMulti||[]).map(i=>q.choices[i]).join(', '):String(q.correct);
        const borderCol=correct?'#bbf7d0':partial?'#fde68a':'#fecaca';
        const bgCol=correct?'#f0fdf4':partial?'#fefce8':'#fff1f2';
        const statusLabel=correct?'✓ Correct':partial?'◐ Partial ('+Math.round(credit*100)+'%)':'✗ Incorrect';
        const statusCol=correct?'#166534':partial?'#854d0e':'#991b1b';
        return(
          <div key={q.id} style={{border:'1px solid '+borderCol,borderRadius:12,padding:16,marginBottom:10,background:bgCol}}>
            <div className="flex-between mb8">
              <span style={{fontWeight:700,fontSize:13,color:'#6b7280'}}>Q{qi+1} · {q.difficulty}</span>
              <span style={{fontWeight:700,fontSize:13,color:statusCol}}>{statusLabel}</span>
            </div>
            <div className="fw6 mb8" style={{fontSize:15,lineHeight:1.5}}>{q.text}</div>
            {q.image&&<img src={q.image} alt="" style={{maxHeight:100,borderRadius:8,marginBottom:8,border:'1px solid #e5e7eb',display:'block'}}/>}
            {q.format!=='numeric'&&q.choices.map((ch,ci)=>{
              const isCor=q.format==='mc'?ci===q.correct:(q.correctMulti||[]).includes(ci);
              const isAns=q.format==='mc'?Number(ans)===ci:(Array.isArray(ans)&&ans.map(Number).includes(ci));
              const bg=isCor?'#dcfce7':isAns&&!isCor?'#fee2e2':'transparent';
              const bdr='1px solid '+(isCor?'#bbf7d0':isAns&&!isCor?'#fecaca':'transparent');
              const col=isCor?'#166534':isAns&&!isCor?'#991b1b':'#374151';
              const lbl=isAns&&isCor?' ✓ your answer':isAns&&!isCor?' ✗ your answer':!isAns&&isCor?' ← correct':'';
              return(isCor||isAns)?(
                <div key={ci} style={{padding:'6px 10px',borderRadius:8,marginBottom:4,fontSize:14,background:bg,border:bdr,color:col}}>
                  {isCor?'✓ ':isAns&&!isCor?'✗ ':''}{ch}<span style={{fontSize:12,fontWeight:600}}>{lbl}</span>
                </div>
              ):null;
            })}
            {q.format==='numeric'&&(
              <div>
                <div className="text-sm mb4" style={{color:'#374151'}}><strong>Your answer:</strong> {ansText}</div>
                <div className="text-sm mb4" style={{color:'#166534'}}><strong>Correct:</strong> {q.correct} ± {q.tolerance||0.5}</div>
              </div>
            )}
            {q.explanation&&<div className="text-sm mt8" style={{background:'rgba(0,0,0,.04)',borderRadius:7,padding:'8px 10px'}}><strong>Explanation:</strong> {q.explanation}</div>}
            {q.format==='mc'&&!correct&&(q.wrongExplanations||{})[Number(ans)]&&(
              <div className="text-sm mt6" style={{background:'#fef9c3',borderRadius:7,padding:'8px 10px',border:'1px solid #fde68a',color:'#854d0e'}}><strong>Why your answer was wrong:</strong> {q.wrongExplanations[Number(ans)]}</div>
            )}
            {q.format==='numeric'&&!correct&&(q.wrongExplanations||{})['numeric']&&(
              <div className="text-sm mt6" style={{background:'#fef9c3',borderRadius:7,padding:'8px 10px',border:'1px solid #fde68a',color:'#854d0e'}}><strong>Hint:</strong> {q.wrongExplanations['numeric']}</div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// STUDENT DASHBOARD
// ═══════════════════════════════════════════════════════════
function StudentDashboard({attempts,standards,questions,studentId,studentName,courseName,units,videos,onTake,onReview}){
  const myAttempts=attempts.filter(a=>a.studentId===studentId);
  const best=bestMastery(myAttempts,studentId,questions);
  const allAsms=units.flatMap(u=>u.assessments);
  const hasAttempts=myAttempts.length>0;
  // Only recommend videos for standards that are red/yellow AND student has attempted them
  const needsReview=hasAttempts?standards.filter(s=>{const l=masteryLevel(best[s.id]);return l==='red'||l==='yellow';}):[]; 
  const recVids=videos.filter(v=>v.standards.some(sid=>needsReview.some(s=>s.id===sid)));

  return(
    <div>
      <div className="flex-between mb16">
        <div><div className="section-title mb4">My progress</div><div className="section-sub" style={{marginBottom:0}}>Best mastery per standard across all attempts.</div></div>
        <button className="print-btn no-print" onClick={()=>printStudentCourseReport({student:{id:studentId,name:studentName||'Student'},course:{name:courseName||'Course'},attempts,questions,standards,units})}>
          🖨 Print my report
        </button>
      </div>
      <div className="card mb16">
        {standards.length===0&&<div className="text-muted text-sm" style={{padding:12}}>No standards defined.</div>}
        {standards.map(s=>(
          <div key={s.id} className="flex-between" style={{padding:'10px 0',borderBottom:'1px solid #f3f4f6'}}>
            <div><span className="std-badge">{s.code}</span> <span className="fw6" style={{fontSize:14,marginLeft:4}}>{s.title}</span></div>
            <MasteryCell score={best[s.id]}/>
          </div>
        ))}
      </div>
      {recVids.length>0&&(
        <div className="card mb20" style={{border:'1px solid #fde68a',background:'#fffbeb'}}>
          <div className="fw7 mb4" style={{fontSize:15,color:'#92400e'}}>📺 Recommended for you</div>
          <div className="text-sm mb12" style={{color:'#92400e'}}>Based on standards that need review:</div>
          {recVids.map(v=>(
            <div key={v.id} className="video-card" style={{marginBottom:6,background:'#fff'}}>
              <div className="video-thumb">{v.thumb||'▶'}</div>
              <div style={{flex:1}}><div className="fw6 text-sm">{v.title}</div>{v.desc&&<div className="text-xs text-muted mt4">{v.desc}</div>}</div>
              <a href={v.url} target="_blank" rel="noreferrer" className="btn btn-ghost btn-sm" style={{color:'#4F46E5'}}>Watch →</a>
            </div>
          ))}
        </div>
      )}
      <div className="flex-between mb12">
        <div className="fw6">Assessment history</div>
        <button className="btn btn-primary btn-sm" onClick={onTake}>Take assessment</button>
      </div>
      {myAttempts.length===0&&<div className="card" style={{textAlign:'center',color:'#9ca3af',padding:32}}>No attempts yet.</div>}
      {myAttempts.map((att,i)=>{
        const asm=allAsms.find(a=>a.id===att.assessmentId);
        const qs=questions.filter(q=>att.answers.hasOwnProperty(q.id));
        const {overall}=scoreAttempt(att,qs);
        const pct=overall.total>0?Math.round(overall.earned/overall.total*100):0;
        return(
          <div key={att.id} className="card mb8">
            <div className="flex-between mb8">
              <div>
                <div className="fw6 text-sm">{asm?.title||'Assessment'}</div>
                <div className="text-xs text-muted mt4">{new Date(att.submittedAt).toLocaleString()}{att.timeExpired?' — time expired':''}</div>
              </div>
              <div className="flex gap8">
                <span className={`tag ${pct>=85?'tag-green':pct>=60?'tag-yellow':'tag-red'}`}>{pct}% ({overall.earned}/{overall.total})</span>
                <button className="btn btn-secondary btn-sm" onClick={()=>onReview&&onReview(att,qs,asm)}>Review →</button>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// STUDENT ASSESSMENT PICKER (with gating)
// ═══════════════════════════════════════════════════════════
function AssessmentPicker({units,questions,standards,videos,studentName,studentId,studentEmail,roster,attempts,onSubmit,onBack}){
  const [picked,setPicked]=useState(null);

  function isUnlocked(asm){
    if(!asm.prerequisiteId) return true;
    const pct=bestOverallPct(attempts,studentId,asm.prerequisiteId,questions);
    return pct!==null&&pct>=(asm.prerequisiteGrade||0);
  }

  if(picked){
    let qs=[];
    const hasPool=picked.poolSettings&&Object.keys(picked.poolSettings).length>0&&
      Object.values(picked.poolSettings).some(d=>(Number(d.Basic)||0)+(Number(d.Conceptual)||0)+(Number(d.Applied)||0)>0);

    if(hasPool){
      // Draw randomly from pool
      qs=drawFromPool(questions,picked.poolSettings,picked.randomize);
    } else {
      // Legacy: use fixed questionIds
      const qIds=picked.questionIds||[];
      qs=questions.filter(q=>qIds.includes(q.id));
      if(qs.length===0&&qIds.length>0)
        qs=questions.filter(q=>qIds.map(String).includes(String(q.id)));
      if(picked.randomize) qs=[...qs].sort(()=>Math.random()-.5);
    }

    if(qs.length===0){
      return(
        <div style={{maxWidth:540,margin:'0 auto'}}>
          <div className="card" style={{padding:32,textAlign:'center'}}>
            <div style={{fontSize:32,marginBottom:12}}>⚠️</div>
            <div className="fw7" style={{fontSize:18,marginBottom:8}}>{hasPool?'Not enough questions in pool':'No questions yet'}</div>
            <div className="text-muted mb20">{hasPool?'Add more questions to your question bank to meet the pool requirements.':'This assessment has no questions yet. Please contact your instructor.'}</div>
            <button className="btn btn-secondary" onClick={()=>setPicked(null)}>← Back</button>
          </div>
        </div>
      );
    }
    // Apply student time extension from roster
    const rosterEntry=(roster||[]).find(s=>s.id===studentId||s.email===studentEmail);
    const extraTime=rosterEntry?.extraTime||0;
    const asmWithTime={...picked,timeLimit:(picked.timeLimit||20)+extraTime};
    return <AssessmentTaker assessment={asmWithTime} questions={qs} standards={standards} videos={videos} studentName={studentName} studentId={studentId} onSubmit={att=>{onSubmit(att);setPicked(null);}} onCancel={()=>setPicked(null)}/>;
  }

  return(
    <div>
      <div className="section-title mb4">Take an assessment</div>
      <div className="section-sub">Choose a published assessment below.</div>
      {!units.some(u=>u.assessments.some(a=>a.published))&&<div className="card" style={{textAlign:'center',color:'#9ca3af',padding:32}}>No published assessments yet.</div>}
      {units.map(unit=>{
        const pub=unit.assessments.filter(a=>a.published);
        if(!pub.length) return null;
        return(
          <div key={unit.id} style={{marginBottom:20}}>
            <div className="fw7 text-sm text-muted mb8" style={{textTransform:'uppercase',letterSpacing:'.5px'}}>{unit.name}</div>
            {pub.map(asm=>{
              const unlocked=isUnlocked(asm);
              const cnt=attempts.filter(a=>a.assessmentId===asm.id&&a.studentId===studentId).length;
              const prereq=asm.prerequisiteId?units.flatMap(u=>u.assessments).find(a=>a.id===asm.prerequisiteId):null;
              return(
                <div key={asm.id} className="asm-card" style={{cursor:unlocked?'pointer':'default',opacity:unlocked?1:0.6,background:unlocked?'#fff':'#f9fafb'}} onClick={()=>{if(unlocked)setPicked(asm);}}>
                  <div style={{flex:1}}>
                    <div className="fw6" style={{fontSize:15,display:'flex',alignItems:'center',gap:8}}>{!unlocked&&<span>🔒</span>}{asm.title}</div>
                    <div className="flex gap6 mt6 flex-wrap">
                      <span className="tag tag-gray">⏱ {asm.timeLimit} min</span>
                      <span className="tag tag-gray">{asm.questionIds.length} questions</span>
                      {cnt>0&&<span className="tag tag-blue">Attempted {cnt}×</span>}
                      {!unlocked&&prereq&&<span className="tag tag-yellow">Requires {Math.round(asm.prerequisiteGrade||0)}% on "{prereq.title}"</span>}
                    </div>
                  </div>
                  {unlocked?<button className="btn btn-primary btn-sm">Start →</button>:<span className="text-sm text-muted">Locked</span>}
                </div>
              );
            })}
          </div>
        );
      }).filter(Boolean)}
      <button className="btn btn-ghost mt8" onClick={onBack}>← Back to my progress</button>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// STUDENT ROSTER MANAGER (Instructor tab)
// ═══════════════════════════════════════════════════════════
function RosterManager({course,updateCourse}){
  const [email,setEmail]=useState('');
  const [name,setName]=useState('');
  const [msg,setMsg]=useState('');
  const [msgType,setMsgType]=useState('success');
  const roster=course.roster||[];

  function flash(text,type='success'){setMsg(text);setMsgType(type);setTimeout(()=>setMsg(''),3500);}

  const [extraTimeId,setExtraTimeId]=useState(null);
  const [extraTimeVal,setExtraTimeVal]=useState(0);

  function addStudent(){
    const e=email.trim().toLowerCase();
    const n=name.trim();
    if(!e||!n){flash('Both name and email are required.','error');return;}
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e)){flash('Please enter a valid email address.','error');return;}
    if(roster.find(s=>s.email===e)){flash('A student with this email is already enrolled.','error');return;}
    const newRoster=[...roster,{id:'stu_'+Date.now(),name:n,email:e,extraTime:0}];
    updateCourse({roster:newRoster});
    setEmail('');setName('');
    flash(`${n} added to the course.`);
  }

  function removeStudent(id){
    updateCourse({roster:roster.filter(s=>s.id!==id)});
  }

  function saveExtraTime(id){
    const newRoster=roster.map(s=>s.id===id?{...s,extraTime:Number(extraTimeVal)||0}:s);
    updateCourse({roster:newRoster});
    setExtraTimeId(null);
    flash('Extra time saved.');
  }

  return(
    <div>
      <div className="section-title mb4">Student roster</div>
      <div className="section-sub">Students can only access this course if their email is on this list.</div>
      {msg&&<div className={`info-box ${msgType==='error'?'info-error':'info-success'} mb16`}>{msg}</div>}
      {roster.length===0&&<div className="card mb16" style={{textAlign:'center',color:'#9ca3af',padding:32}}>No students enrolled yet. Add students below.</div>}
      {roster.map(s=>(
        <div key={s.id} style={{border:'1px solid #e5e7eb',borderRadius:10,padding:'11px 16px',marginBottom:8,background:'#fff'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:12}}>
            <div>
              <div className="fw6" style={{fontSize:14}}>{s.name}</div>
              <div className="text-xs text-muted">{s.email}</div>
              {(s.extraTime||0)>0&&<div className="text-xs mt4" style={{color:'#1e40af',fontWeight:600}}>+{s.extraTime} min extra time</div>}
            </div>
            <div className="flex gap6">
              <button className="btn btn-secondary btn-sm" onClick={()=>{setExtraTimeId(s.id);setExtraTimeVal(s.extraTime||0);}}>⏱ Extra time</button>
              <button className="btn btn-ghost btn-sm" style={{color:'#dc2626'}} onClick={()=>removeStudent(s.id)}>Remove</button>
            </div>
          </div>
          {extraTimeId===s.id&&(
            <div style={{marginTop:10,padding:'10px 12px',background:'#f0f4ff',borderRadius:8,display:'flex',alignItems:'center',gap:10}}>
              <span className="text-sm fw6">Extra time (minutes):</span>
              <input type="number" min="0" max="120" value={extraTimeVal} onChange={e=>setExtraTimeVal(e.target.value)} style={{width:70,padding:'4px 8px',border:'0.5px solid #c5d0f0',borderRadius:7,fontSize:14,textAlign:'center'}}/>
              <button className="btn btn-primary btn-sm" onClick={()=>saveExtraTime(s.id)}>Save</button>
              <button className="btn btn-ghost btn-sm" onClick={()=>setExtraTimeId(null)}>Cancel</button>
              <span className="text-xs text-muted">Added to all assessments for this student</span>
            </div>
          )}
        </div>
      ))}
      <div className="card mt16">
        <div className="fw6 mb12">Add a student</div>
        <div className="grid2" style={{gap:8,marginBottom:8}}>
          <div><label>Full name</label><input className="input mt4" value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addStudent()} placeholder="Jane Smith"/></div>
          <div><label>Email address</label><input className="input mt4" type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addStudent()} placeholder="jane@school.edu"/></div>
        </div>
        <button className="btn btn-primary" onClick={addStudent}>Add student</button>
      </div>
    </div>
  );
}

function StudentGate({course,onEnter,onBack}){
  const [email,setEmail]=useState('');

  function handleSubmit(){
    setErr('');

    if(!match){setErr('This email is not enrolled in this course. Please contact your instructor.');return;}

    onEnter({id:match.id,name:match.name,email:match.email});

    <div style={{minHeight:'60vh',display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>

  );
}

// ═══════════════════════════════════════════════════════════
// INSTRUCTOR PASSWORD GATE
// ═══════════════════════════════════════════════════════════
function InstructorGate({onUnlock,onCancel,accounts,setAccounts}){
  const [view,setView]=useState('login'); // login | register
  const [name,setName]=useState('');
  const [pass,setPass]=useState('');
  const [newName,setNewName]=useState('');
  const [newPass,setNewPass]=useState('');
  const [confirmPass,setConfirmPass]=useState('');
  const [err,setErr]=useState('');
  const [success,setSuccess]=useState('');

  function attemptLogin(){
    setErr('');
    if(!pass){setErr('Please enter your password.');return;}
    const match=accounts.find(a=>a.password===pass);
    if(match){onUnlock(match);}
    else{setErr('Incorrect password. Try again or create a new account.');setPass('');}
  }

  function createAccount(){
    setErr('');
    if(!newName.trim()){setErr('Please enter your name.');return;}
    if(!newPass){setErr('Please enter a password.');return;}
    if(newPass.length<4){setErr('Password must be at least 4 characters.');return;}
    if(newPass!==confirmPass){setErr('Passwords do not match.');return;}
    if(accounts.find(a=>a.password===newPass)){setErr('That password is already in use. Choose a different one.');return;}
    const newAcct={id:'inst_'+Date.now(),name:newName.trim(),password:newPass};
    setAccounts(prev=>[...prev,newAcct]);
    setSuccess('Account created! You can now sign in with your password.');
    setView('login');
    setNewName('');setNewPass('');setConfirmPass('');
  }

  if(view==='register') return(
    <div style={{minHeight:'70vh',display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
      <div style={{width:'100%',maxWidth:400}}>
        <div className="card" style={{padding:32}}>
          <div style={{fontSize:28,textAlign:'center',marginBottom:12}}>🔐</div>
          <div className="fw7" style={{fontSize:18,marginBottom:4,textAlign:'center'}}>Create instructor account</div>
          <div className="text-sm text-muted mb20" style={{textAlign:'center'}}>Set up your personal instructor login.</div>
          {err&&<div className="info-box info-error mb12">{err}</div>}
          <label>Your name</label>
          <input className="input mt4 mb12" value={newName} onChange={e=>setNewName(e.target.value)} placeholder="e.g. Dr. Smith"/>
          <label>Choose a password</label>
          <input className="input mt4 mb8" type="password" value={newPass} onChange={e=>setNewPass(e.target.value)} placeholder="At least 4 characters"/>
          <label>Confirm password</label>
          <input className="input mt4 mb20" type="password" value={confirmPass} onChange={e=>setConfirmPass(e.target.value)} onKeyDown={e=>e.key==='Enter'&&createAccount()} placeholder="Re-enter password"/>
          <button className="btn btn-primary mb8" style={{width:'100%',justifyContent:'center'}} onClick={createAccount}>Create account</button>
          <button className="btn btn-ghost btn-sm" style={{width:'100%',justifyContent:'center'}} onClick={()=>{setView('login');setErr('');}}>← Back to sign in</button>
        </div>
      </div>
    </div>
  );

  return(
    <div style={{minHeight:'70vh',display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
      <div style={{width:'100%',maxWidth:400}}>
        <div className="card" style={{padding:32}}>
          <div style={{fontSize:28,textAlign:'center',marginBottom:12}}>🔐</div>
          <div className="fw7" style={{fontSize:18,marginBottom:4,textAlign:'center'}}>Instructor sign in</div>
          <div className="text-sm text-muted mb20" style={{textAlign:'center'}}>Enter your instructor password to access course management.</div>
          {err&&<div className="info-box info-error mb12">{err}</div>}
          {success&&<div className="info-box info-success mb12">{success}</div>}
          <label>Password</label>
          <input className="input mt4 mb16" type="password" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==='Enter'&&attemptLogin()} placeholder="Your instructor password" autoFocus/>
          <button className="btn btn-primary mb8" style={{width:'100%',justifyContent:'center'}} onClick={attemptLogin}>Sign in</button>
          {/* Self-registration removed — accounts managed by admin only */}
          {onCancel&&<button className="btn btn-ghost btn-sm" style={{width:'100%',justifyContent:'center'}} onClick={onCancel}>← Back to student login</button>}
        </div>
        <div className="text-xs text-muted mt12" style={{textAlign:'center'}}>
          {accounts.length} instructor account{accounts.length!==1?'s':''} registered
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// COPY COURSE FORM
// ═══════════════════════════════════════════════════════════
function CopyCourseForm({sourceCourse,onCreate,onCancel,instructorId}){
  const [name,setName]=useState(sourceCourse.name+' — Copy');
  const [desc,setDesc]=useState(sourceCourse.description||'');
  const [pass,setPass]=useState('');
  const [err,setErr]=useState('');

  function submit(){
    if(!name.trim()){setErr('Course name is required.');return;}
    if(!pass.trim()){setErr('Student password is required.');return;}
    // Deep-copy course content but wipe attempts and regenerate IDs for units/assessments
    const newId='c'+Date.now();
    const idMap={};
    const newUnits=(sourceCourse.units||[]).map(u=>{
      const newUid='u'+Date.now()+Math.random().toString(36).slice(2);
      const newAsms=u.assessments.map(a=>{
        const newAid='a'+Date.now()+Math.random().toString(36).slice(2);
        idMap[a.id]=newAid;
        return{...a,id:newAid,prerequisiteId:null}; // remap prerequisites after
      });
      return{...u,id:newUid,assessments:newAsms};
    });
    // Remap prerequisiteIds using the id map
    const remappedUnits=newUnits.map(u=>({...u,assessments:u.assessments.map(a=>({...a,prerequisiteId:a.prerequisiteId?idMap[a.prerequisiteId]||null:null}))}));
    // Copy questions with fresh IDs
    const qIdMap={};
    const newQuestions=(sourceCourse.questions||[]).map(q=>{
      const newQid='q'+Date.now()+Math.random().toString(36).slice(2);
      qIdMap[q.id]=newQid;
      return{...q,id:newQid};
    });
    // Remap questionIds in assessments
    const finalUnits=remappedUnits.map(u=>({...u,assessments:u.assessments.map(a=>({...a,questionIds:(a.questionIds||[]).map(qid=>qIdMap[qid]||qid)}))}));
    onCreate({
      id:newId,
      instructorId:instructorId||sourceCourse.instructorId||'inst_default',
      name:name.trim(),
      description:desc.trim(),
      studentPassword:pass.trim(),
      roster:[],
      standards:JSON.parse(JSON.stringify(sourceCourse.standards||[])),
      units:finalUnits,
      questions:newQuestions,
      videos:JSON.parse(JSON.stringify(sourceCourse.videos||[])),
      attempts:[],
    });
  }

  return(
    <div className="page" style={{maxWidth:540}}>
      <button className="btn btn-ghost mb16" onClick={onCancel}>← Back</button>
      <div className="section-title mb4">Copy course</div>
      <div className="section-sub">Creates a new section with the same standards, units, assessments, and questions — but no student data.</div>
      <div className="info-box info-info mb16">
        <strong>Copying from:</strong> {sourceCourse.name}<br/>
        <span className="text-sm">Includes: {(sourceCourse.standards||[]).length} standards · {(sourceCourse.units||[]).flatMap(u=>u.assessments).length} assessments · {(sourceCourse.questions||[]).length} questions · {(sourceCourse.videos||[]).length} videos</span>
      </div>
      <div className="card">
        {err&&<div className="info-box info-error mb12">{err}</div>}
        <label>New section name</label>
        <input className="input mt4 mb12" value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Human Physiology I — Section 2"/>
        <label>Description</label>
        <textarea className="input mt4 mb12" rows={2} value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Brief description…"/>
        <label>Student password for this section</label>
        <input className="input mt4 mb4" value={pass} onChange={e=>setPass(e.target.value)} placeholder="Choose a password for this section's students"/>
        <div className="text-xs text-muted mb20">Each section has its own password so students only access their section.</div>
        <div className="flex gap8">
          <button className="btn btn-primary" onClick={submit}>Create copy</button>
          <button className="btn btn-secondary" onClick={onCancel}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// STUDENT EMAIL ENTRY (finds courses by email)
// ═══════════════════════════════════════════════════════════
function StudentEmailEntry({courses,onEnter}){
  const [email,setEmail]=useState('');
  const [err,setErr]=useState('');

  function handleSubmit(){
    setErr('');
    const e=email.trim().toLowerCase();
    if(!e){setErr('Please enter your email address.');return;}
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e)){setErr('Please enter a valid email address.');return;}
    // Find all courses this email is enrolled in
    const enrolled=courses.filter(c=>(c.roster||[]).some(s=>s.email===e));
    if(enrolled.length===0){setErr('No courses found for this email. Please contact your instructor to be added.');return;}
    // Get student record from any of the enrolled courses
    const rosterEntry=enrolled[0].roster.find(s=>s.email===e);
    // If enrolled in exactly one course, jump straight in
    if(enrolled.length===1){
      onEnter({id:rosterEntry.id,name:rosterEntry.name,email:e},enrolled[0]);
    } else {
      // Multiple courses — let App handle course picker
      onEnter({id:rosterEntry.id,name:rosterEntry.name,email:e},null);
    }
  }

  return(
    <div className="card" style={{padding:36}}>
      <div style={{textAlign:'center',marginBottom:24}}>
        <div className="nav-logo" style={{fontSize:22,display:'inline-block',marginBottom:8}}>Mastery<span style={{color:'#4F46E5'}}>Track</span></div>
        <div className="fw7" style={{fontSize:18,marginBottom:4}}>Student sign in</div>
        <div className="text-sm text-muted">Enter your email to access your courses.</div>
      </div>
      {err&&<div className="info-box info-error mb12">{err}</div>}
      <label>Email address</label>
      <input className="input mt4 mb20" type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleSubmit()} placeholder="you@school.edu" autoFocus/>
      <button className="btn btn-primary" style={{width:'100%',justifyContent:'center',padding:12,fontSize:15}} onClick={handleSubmit}>Continue</button>
      <div className="text-xs text-muted mt12" style={{textAlign:'center'}}>You must be added by your instructor before you can sign in.</div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// API HELPER
// ═══════════════════════════════════════════════════════════
const API = '/api/data';
async function api(action, body={}) {
  const res = await fetch(API, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({action, ...body})
  });
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || 'API error');
  return data;
}

// ═══════════════════════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════════════════════
function App(){
  const [mode,setMode]=useState('student');
  const [instUnlocked,setInstUnlocked]=useState(false);
  const [currentInstructor,setCurrentInstructor]=useState(null);
  const [instructorAccounts,setInstructorAccounts]=useState([]);
  const [courses,setCourses]=useState([]);
  const [selectedCourse,setSelectedCourse]=useState(null);
  const [instScreen,setInstScreen]=useState('list');
  const [copySource,setCopySource]=useState(null);
  const [instTab,setInstTab]=useState('dashboard');
  const [student,setStudent]=useState(null);
  const [stuTab,setStuTab]=useState('dashboard');
  const [reviewAttempt,setReviewAttempt]=useState(null);
  const [selectedStudentCourse,setSelectedStudentCourse]=useState(null);
  const [dbLoading,setDbLoading]=useState(true);
  const [dbError,setDbError]=useState('');
  const [saving,setSaving]=useState(false);
  const [fontSize,setFontSize]=useState('md');
  const fontSizeMap={sm:'13px',md:'16px',lg:'22px'};

  useEffect(()=>{ document.documentElement.style.setProperty('--fs', fontSizeMap[fontSize]||'15px'); },[fontSize]);

  // ── Load data from Neon on mount ──────────────────────────────────────────
  useEffect(()=>{
    async function load(){
      setDbLoading(true);
      try {
        const [cRes, iRes] = await Promise.all([
          api('getCourses'),
          api('getInstructors')
        ]);
        // Load attempts for each course
        const coursesWithAttempts = await Promise.all(
          cRes.courses.map(async course => {
            const aRes = await api('getAttempts', {courseId: course.id});
            return {...course, attempts: aRes.attempts};
          })
        );
        // If no courses, seed with example course
        if(coursesWithAttempts.length === 0){
          const seed = {...SEED_COURSE};
          await api('saveCourse', {course: seed});
          for(const att of SEED_ATTEMPTS){
            await api('saveAttempt', {attempt: att, courseId: seed.id});
          }
          seed.attempts = SEED_ATTEMPTS;
          setCourses([seed]);
        } else {
          // Fix any courses that were saved without questions (re-save them)
          const fixed = await Promise.all(coursesWithAttempts.map(async course => {
            if((course.questions||[]).length === 0 && course.id === 'c1') {
              // Re-seed the default course with full data
              const fullCourse = {...SEED_COURSE, ...course, questions: SEED_QUESTIONS, units: SEED_UNITS};
              await api('saveCourse', {course: fullCourse});
              return {...fullCourse, attempts: course.attempts};
            }
            return course;
          }));
          setCourses(fixed);
        }
        setInstructorAccounts(iRes.accounts);
      } catch(e) {
        console.error(e);
        setDbError(e.message);
      }
      setDbLoading(false);
    }
    load();
  },[]);

  // ── Live course ───────────────────────────────────────────────────────────
  const myCourses = currentInstructor
    ? courses.filter(c=>c.instructorId===currentInstructor.id)
    : [];
  const course = myCourses.find(c=>c.id===selectedCourse?.id)||selectedCourse;

  // ── Update course — saves to Neon ─────────────────────────────────────────
  async function updateCourse(patch){
    // Always get the freshest course from state to avoid stale closure issues
    const courseId = selectedCourse?.id;
    if(!courseId){ console.error('updateCourse: no selectedCourse'); return; }
    setCourses(prev=>{
      const fresh = prev.find(c=>c.id===courseId)||selectedCourse;
      const updated = {...fresh, ...patch};
      // Save to Neon asynchronously
      setSaving(true);
      api('saveCourse', {course: updated})
        .then(()=>setSaving(false))
        .catch(e=>{ console.error('Save failed:',e); setSaving(false); });
      return prev.map(c=>c.id===courseId?updated:c);
    });
    setSelectedCourse(prev=>prev?{...prev,...patch}:prev);
  }

  const setStandards=v=>updateCourse({standards:typeof v==='function'?v(course.standards):v});
  const setUnits=v=>updateCourse({units:typeof v==='function'?v(course.units):v});
  const setQuestions=v=>updateCourse({questions:typeof v==='function'?v(course.questions):v});
  const setVideos=v=>updateCourse({videos:typeof v==='function'?v(course.videos):v});

  async function addAttempt(att, courseId){
    const cid = courseId || selectedStudentCourse?.id;
    try { await api('saveAttempt', {attempt: att, courseId: cid}); }
    catch(e){ console.error('Attempt save failed:',e); }
    setCourses(prev=>prev.map(c=>{
      const ids=(c.units||[]).flatMap(u=>u.assessments.map(a=>a.id));
      if(!ids.includes(att.assessmentId)) return c;
      return{...c,attempts:[...(c.attempts||[]),att]};
    }));
  }

  function goToInstructor(){setMode('instructor');setInstUnlocked(false);setCurrentInstructor(null);setSelectedCourse(null);setInstScreen('list');setInstTab('dashboard');setCopySource(null);}
  function goToStudent(){setMode('student');setInstUnlocked(false);setCurrentInstructor(null);setStudent(null);setSelectedStudentCourse(null);setStuTab('dashboard');}

  const INST_TABS=['dashboard','students','standards','assessments','videos'];
  const INST_LABELS={dashboard:'Dashboard',students:'Students',standards:'Standards',assessments:'Assessments',videos:'Videos'};

  // ── Font size control ─────────────────────────────────────────────────────
  const FontSizeControl=()=>(
    <div style={{display:'flex',alignItems:'center',gap:6}}>
      <span style={{fontSize:'11px',color:'rgba(255,255,255,.5)',fontWeight:500,marginRight:2}}>Text</span>
      {[['sm','11px'],['md','15px'],['lg','21px']].map(([k,sz])=>(
        <button key={k} className={`fs-btn ${fontSize===k?'fs-active':''}`} style={{fontSize:sz,width:k==='lg'?36:k==='md'?30:24,height:k==='lg'?34:k==='md'?28:24}} onClick={()=>setFontSize(k)} title={k==='sm'?'Small text':k==='md'?'Default text':'Large text (accessibility)'}>A</button>
      ))}
    </div>
  );

  // ── Student Nav ───────────────────────────────────────────────────────────
  const StudentNav=()=>(
    <nav className="nav">
      <span className="nav-logo">Mastery<span>Track</span></span>
      {selectedStudentCourse&&<span style={{fontSize:'.85em',color:'rgba(255,255,255,.6)',fontWeight:500}}>{selectedStudentCourse.name}</span>}
      <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:12}}>
        <FontSizeControl/>
        {student&&<><span style={{fontSize:'.85em',color:'rgba(255,255,255,.75)'}}>Hi, <strong>{student.name}</strong></span><button className="nav-btn" onClick={goToStudent}>Sign out</button></>}
      </div>
    </nav>
  );

  // ── Instructor Nav ────────────────────────────────────────────────────────
  const InstructorNav=()=>(
    <nav className="nav">
      <span className="nav-logo">Mastery<span>Track</span></span>
      {course&&instScreen==='course'&&<><button className="nav-btn" onClick={()=>{setInstScreen('list');setSelectedCourse(null);setInstTab('dashboard');}}>← Courses</button><span style={{fontSize:'.85em',color:'rgba(255,255,255,.65)',fontWeight:500}}>{course.name}</span></>}
      <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:12}}>
        <FontSizeControl/>
        {saving&&<span style={{fontSize:'.8em',color:'rgba(255,255,255,.5)'}}>💾 Saving…</span>}
        {instUnlocked&&<><span className="nav-badge">📋 {currentInstructor?.name||'Instructor'}</span><button className="nav-btn" onClick={goToStudent}>Exit to student view</button></>}
      </div>
    </nav>
  );

  // ── Loading / Error ───────────────────────────────────────────────────────
  if(dbLoading) return(
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'var(--bg)',gap:16}}>
      <span className="nav-logo" style={{fontSize:24}}>Mastery<span style={{color:'#7dd3fc'}}>Track</span></span>
      <Spinner/>
      <div className="text-muted text-sm">Connecting to database…</div>
    </div>
  );

  if(dbError) return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)',padding:24}}>
      <div className="card" style={{maxWidth:460,textAlign:'center',padding:32}}>
        <div style={{fontSize:32,marginBottom:12}}>⚠️</div>
        <div className="fw7" style={{fontSize:18,marginBottom:8}}>Could not connect to database</div>
        <div className="text-muted text-sm mb16">{dbError}</div>
        <div className="text-sm text-muted">Make sure your DATABASE_URL environment variable is set correctly in Vercel.</div>
        <button className="btn btn-primary mt16" onClick={()=>window.location.reload()}>Retry</button>
      </div>
    </div>
  );

  // ── INSTRUCTOR MODE ───────────────────────────────────────────────────────
  if(mode==='instructor'){
    if(!instUnlocked) return(
      <><InstructorNav/>
      <InstructorGate
        onUnlock={acct=>{setInstUnlocked(true);setCurrentInstructor(acct);}}
        onCancel={goToStudent}
        accounts={instructorAccounts}
        setAccounts={async (updater)=>{
          const newAccounts=typeof updater==='function'?updater(instructorAccounts):updater;
          setInstructorAccounts(newAccounts);
          // New account is the last one added — save it
          const newest=newAccounts[newAccounts.length-1];
          if(newest&&!instructorAccounts.find(a=>a.id===newest.id)){
            try{ await api('createInstructor',{id:newest.id,name:newest.name,password:newest.password}); }
            catch(e){ console.error(e); }
          }
        }}
      /></>
    );
    if(instScreen==='new') return(<><InstructorNav/><NewCourseForm instructorId={currentInstructor?.id} onCreate={async c=>{setCourses(prev=>[...prev,{...c,attempts:[]}]);await api('saveCourse',{course:c});setInstScreen('list');}} onCancel={()=>setInstScreen('list')}/></>);
    if(instScreen==='list') return(<><InstructorNav/><CourseList courses={myCourses} onSelect={c=>{setSelectedCourse(c);setInstScreen('course');setInstTab('dashboard');}} onNew={()=>setInstScreen('new')} onCopy={c=>{setCopySource(c);setInstScreen('copy');}}/></>);
    if(instScreen==='copy'&&copySource) return(<><InstructorNav/><CopyCourseForm instructorId={currentInstructor?.id} sourceCourse={copySource} onCreate={async newC=>{setCourses(prev=>[...prev,{...newC,attempts:[]}]);await api('saveCourse',{course:newC});setCopySource(null);setInstScreen('list');}} onCancel={()=>{setCopySource(null);setInstScreen('list');}}/></>);
    if(instScreen==='course'&&course) return(
      <><InstructorNav/>
      <div className="page">
        <div className="tabs">{INST_TABS.map(t=><button key={t} className={`tab ${instTab===t?'active':''}`} onClick={()=>setInstTab(t)}>{INST_LABELS[t]}</button>)}</div>
        {instTab==='dashboard'&&<InstructorDashboard attempts={course.attempts||[]} standards={course.standards||[]} questions={course.questions||[]} courseName={course.name} units={course.units||[]} roster={course.roster||[]}/>}
        {instTab==='students'&&<RosterManager course={course} updateCourse={updateCourse}/>}
        {instTab==='standards'&&<StandardsManager standards={course.standards||[]} setStandards={setStandards}/>}
        {instTab==='assessments'&&<UnitsManager standards={course.standards||[]} units={course.units||[]} questions={course.questions||[]} setUnits={setUnits} setQuestions={setQuestions} updateCourse={updateCourse}/>}
        {instTab==='videos'&&<VideoLibrary standards={course.standards||[]} videos={course.videos||[]} setVideos={setVideos}/>}
      </div></>
    );
  }

  // ── STUDENT MODE ──────────────────────────────────────────────────────────
  if(!student) return(
    <><StudentNav/>
    <div style={{minHeight:'80vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24}}>
      <div style={{width:'100%',maxWidth:420}}>
        <StudentEmailEntry courses={courses} onEnter={(stu,course)=>{setStudent(stu);setSelectedStudentCourse(course);setStuTab('dashboard');}}/>
      </div>
      <div style={{marginTop:20,width:'100%',maxWidth:420}}>
        <button onClick={goToInstructor} style={{width:'100%',padding:'11px',borderRadius:10,border:'1.5px solid #4361EE',background:'#fff',color:'#4361EE',fontSize:'var(--fs)',fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8,fontFamily:'inherit'}}
          onMouseEnter={e=>e.currentTarget.style.background='#f0f4ff'}
          onMouseLeave={e=>e.currentTarget.style.background='#fff'}>
          🔐 Instructor login
        </button>
      </div>
    </div></>
  );

  if(!selectedStudentCourse){
    const myCrs=courses.filter(c=>(c.roster||[]).some(s=>s.email===student.email));
    if(myCrs.length===1){setSelectedStudentCourse(myCrs[0]);return null;}
    return(
      <><StudentNav/>
      <div className="page">
        <div className="section-title mb4">Your courses</div>
        <div className="section-sub">Select a course to continue.</div>
        <div className="grid2" style={{gap:16}}>
          {myCrs.map(c=><div key={c.id} className="course-card" onClick={()=>setSelectedStudentCourse(c)}><div className="fw7" style={{fontSize:'1.05em',marginBottom:4}}>{c.name}</div>{c.description&&<div className="text-sm text-muted">{c.description}</div>}</div>)}
        </div>
      </div></>
    );
  }

  const liveCourse=courses.find(c=>c.id===selectedStudentCourse.id)||selectedStudentCourse;
  return(
    <><StudentNav/>
    <div className="page">
      {stuTab==='review'&&reviewAttempt?(
        <AttemptReview
          attempt={reviewAttempt.att}
          questions={reviewAttempt.qs}
          assessment={reviewAttempt.asm}
          standards={liveCourse.standards||[]}
          onBack={()=>{setStuTab('dashboard');setReviewAttempt(null);}}
        />
      ):(
        <>
          <div className="tabs">
            <button className={`tab ${stuTab==='dashboard'?'active':''}`} onClick={()=>setStuTab('dashboard')}>My progress</button>
            <button className={`tab ${stuTab==='take'?'active':''}`} onClick={()=>setStuTab('take')}>Take assessment</button>
          </div>
          {stuTab==='dashboard'&&<StudentDashboard attempts={liveCourse.attempts||[]} standards={liveCourse.standards||[]} questions={liveCourse.questions||[]} studentId={student.id} studentName={student.name} courseName={liveCourse.name} units={liveCourse.units||[]} videos={liveCourse.videos||[]} onTake={()=>setStuTab('take')} onReview={(att,qs,asm)=>{setReviewAttempt({att,qs,asm});setStuTab('review');}}/>}
          {stuTab==='take'&&<AssessmentPicker units={liveCourse.units||[]} questions={liveCourse.questions||[]} standards={liveCourse.standards||[]} videos={liveCourse.videos||[]} studentName={student.name} studentId={student.id} studentEmail={student.email} roster={liveCourse.roster||[]} attempts={liveCourse.attempts||[]} onSubmit={att=>{addAttempt(att,liveCourse.id);setStuTab('dashboard');}} onBack={()=>setStuTab('dashboard')}/>}
        </>
      )}
    </div></>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
